services:
  platform:
    build:
      context: ..
      dockerfile: platform/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:pinquark@postgres:5432/pinquark_platform
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      CONNECTOR_DISCOVERY_PATH: /integrators
      APP_ENV: development
      LOG_LEVEL: DEBUG
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - ../integrators:/integrators:ro
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pinquark_platform
      POSTGRES_USER: pinquark
      POSTGRES_PASSWORD: pinquark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinquark -d pinquark_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
