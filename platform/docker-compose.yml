services:
  platform:
    build:
      context: ..
      dockerfile: platform/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD:-devpassword}@postgres:5432/pinquark_platform
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-do-not-use-in-prod}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-do-not-use-in-prod}
      CONNECTOR_DISCOVERY_PATH: /integrators
      APP_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - ../integrators:/integrators:ro
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pinquark_platform
      POSTGRES_USER: pinquark
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinquark -d pinquark_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-devredispass}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-devredispass} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
