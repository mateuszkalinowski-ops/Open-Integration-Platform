services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - platform
      - dashboard
    restart: unless-stopped

  # --- Core Platform ---
  platform:
    image: ghcr.io/mateuszkalinowski-ops/oip/platform:latest
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD:-pinquark}@postgres:5432/pinquark_platform
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEFAULT_API_KEY: ${DEFAULT_API_KEY:-pk_live_default_key_change_me}
      CONNECTOR_DISCOVERY_PATH: /integrators
      APP_ENV: production
      LOG_LEVEL: INFO
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - ./integrators:/integrators:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    image: ghcr.io/mateuszkalinowski-ops/oip/dashboard:latest
    expose:
      - "80"
    environment:
      PINQUARK_API_URL: ""
      PINQUARK_API_KEY: ""
    depends_on:
      - platform
    restart: unless-stopped

  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pinquark_platform
      POSTGRES_USER: pinquark
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pinquark}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinquark -d pinquark_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Connectors (minimal set for testing) ---
  connector-inpost-v3:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-inpost-v3:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-dhl:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-dhl:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-allegro:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-allegro:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-baselinker:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-baselinker:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      BASELINKER_SCRAPING_ENABLED: "false"
      KAFKA_ENABLED: "false"
    depends_on:
      - platform
    restart: unless-stopped

  connector-shopify:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-shopify:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      SHOPIFY_SCRAPING_ENABLED: "false"
      KAFKA_ENABLED: "false"
    depends_on:
      - platform
    restart: unless-stopped

  connector-fxcouriers:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-fxcouriers:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      FXCOURIERS_API_URL: https://fxcouriers.kuriersystem.pl/api/rest
    depends_on:
      - platform
    restart: unless-stopped

  connector-pinquark-wms:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-pinquark-wms:latest
    environment:
      WMS_APP_ENV: production
      WMS_APP_PORT: 8000
      PINQUARK_WMS_EVENT_POLLING_ENABLED: "true"
      PINQUARK_WMS_EVENT_POLLING_INTERVAL_SECONDS: "120"
      PINQUARK_WMS_PLATFORM_API_URL: http://platform:8080
      PINQUARK_WMS_PLATFORM_EVENT_NOTIFY: "true"
    depends_on:
      - platform
    restart: unless-stopped

  connector-email-client:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-email-client:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      EMAIL_POLLING_ENABLED: "true"
      EMAIL_POLLING_INTERVAL_SECONDS: "60"
      KAFKA_ENABLED: "false"
      PLATFORM_API_URL: http://platform:8080
      PLATFORM_API_KEY: ${PINQUARK_CONNECTOR_API_KEY:-}
      PLATFORM_EVENT_NOTIFY: "true"
    depends_on:
      - platform
    restart: unless-stopped

  connector-skanuj-fakture:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-skanuj-fakture:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      KAFKA_ENABLED: "false"
      PLATFORM_API_URL: http://platform:8080
      PLATFORM_EVENT_NOTIFY: "true"
    depends_on:
      - platform
    restart: unless-stopped

  connector-ftp-sftp:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-ftp-sftp:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      FTP_POLLING_ENABLED: "false"
      KAFKA_ENABLED: "false"
      PLATFORM_API_URL: http://platform:8080
      PLATFORM_EVENT_NOTIFY: "true"
    depends_on:
      - platform
    restart: unless-stopped

  connector-slack:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-slack:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      SLACK_POLLING_ENABLED: "false"
      KAFKA_ENABLED: "false"
    depends_on:
      - platform
    restart: unless-stopped

  connector-bulkgate:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-bulkgate:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      KAFKA_ENABLED: "false"
    depends_on:
      - platform
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
