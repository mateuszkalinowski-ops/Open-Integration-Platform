x-connector-healthcheck: &connector-healthcheck
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 30s
    timeout: 5s
    retries: 3

services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - platform
      - dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot:v2.11.0
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  # --- Core Platform ---
  platform:
    image: ghcr.io/${GITHUB_ORG:-your-org}/oip/platform:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD}@postgres:5432/pinquark_platform
      DATABASE_APP_URL: postgresql+asyncpg://pinquark_app:${DB_APP_PASSWORD}@postgres:5432/pinquark_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DEFAULT_API_KEY: ${DEFAULT_API_KEY}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      CONNECTOR_DISCOVERY_PATH: /integrators
      APP_ENV: production
      LOG_LEVEL: INFO
      DEMO_MODE: ${DEMO_MODE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      VERIFICATION_AGENT_URL: http://verification-agent:8000
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-172.18.0.0/16}
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
    volumes:
      - ./integrators:/integrators:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    image: ghcr.io/${GITHUB_ORG:-your-org}/oip/dashboard:${IMAGE_TAG:-latest}
    expose:
      - "80"
    environment:
      PINQUARK_API_URL: ""
    depends_on:
      - platform
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Infrastructure ---
  # Kafka uses PLAINTEXT inside the isolated Docker network (not exposed
  # externally). For multi-node or public-facing setups switch to SASL_SSL.
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "UzDKUkcMXRu30uhJVOqrLA"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 --command-config /dev/null 2>&1 | grep -q ApiVersion"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: pinquark_platform
      POSTGRES_USER: pinquark
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./platform/db/init-app-role.sh:/docker-entrypoint-initdb.d/10-app-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinquark -d pinquark_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Verification Agent ---
  verification-agent:
    image: ghcr.io/${GITHUB_ORG:-your-org}/oip/verification-agent:${IMAGE_TAG:-latest}
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD}@postgres:5432/pinquark_platform
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      VERIFICATION_INTERVAL_DAYS: 7
      VERIFICATION_TIMEOUT_SECONDS: 60
      CONNECTOR_DISCOVERY_PATH: /integrators
      LOG_LEVEL: INFO
    volumes:
      - ./integrators:/integrators:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Connectors ---
  connector-inpost-v3:
    image: ghcr.io/${GITHUB_ORG:-your-org}/oip/connector-inpost-v3:${IMAGE_TAG:-latest}
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped
    <<: *connector-healthcheck

  connector-dhl:
    image: ghcr.io/${GITHUB_ORG:-your-org}/oip/connector-dhl:${IMAGE_TAG:-latest}
    environment:
      APP_ENV: production
      APP_PORT: 8000
