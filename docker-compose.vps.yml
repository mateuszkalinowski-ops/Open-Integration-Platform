  connector-allegro:
    image: ghcr.io/${GITHUB_ORG:-your-org}/oip/connector-allegro:${IMAGE_TAG:-latest}
    environment:
      APP_ENV: production
      APP_PORT: 8000
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
    depends_on:
      - platform
      - kafka
    restart: unless-stopped

  connector-baselinker:
    image: ghcr.io/${GITHUB_ORG:-your-org}/oip/connector-baselinker:${IMAGE_TAG:-latest}
