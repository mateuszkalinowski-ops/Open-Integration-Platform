services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - platform
      - dashboard
    restart: unless-stopped

  # --- Core Platform ---
  platform:
    image: ghcr.io/mateuszkalinowski-ops/oip/platform:latest
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD:-pinquark}@postgres:5432/pinquark_platform
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CONNECTOR_DISCOVERY_PATH: /integrators
      APP_ENV: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    image: ghcr.io/mateuszkalinowski-ops/oip/dashboard:latest
    expose:
      - "80"
    environment:
      PINQUARK_API_URL: ""
      PINQUARK_API_KEY: ${PINQUARK_DASHBOARD_API_KEY:-}
    depends_on:
      - platform
    restart: unless-stopped

  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pinquark_platform
      POSTGRES_USER: pinquark
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pinquark}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinquark -d pinquark_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Connectors (minimal set for testing) ---
  connector-inpost-v3:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-inpost-v3:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-dhl:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-dhl:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-allegro:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-allegro:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-baselinker:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-baselinker:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      BASELINKER_SCRAPING_ENABLED: "false"
      KAFKA_ENABLED: "false"
    depends_on:
      - platform
    restart: unless-stopped

  connector-shopify:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-shopify:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      SHOPIFY_SCRAPING_ENABLED: "false"
      KAFKA_ENABLED: "false"
    depends_on:
      - platform
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
