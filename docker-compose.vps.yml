services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - platform
      - dashboard
    restart: unless-stopped

  # --- Core Platform ---
  platform:
    image: ghcr.io/mateuszkalinowski-ops/oip/platform:latest
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD:-pinquark}@postgres:5432/pinquark_platform
      REDIS_URL: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEFAULT_API_KEY: ${DEFAULT_API_KEY:-pk_live_default_key_change_me}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      CONNECTOR_DISCOVERY_PATH: /integrators
      APP_ENV: production
      LOG_LEVEL: INFO
      DEMO_MODE: ${DEMO_MODE:-false}
      CORS_ALLOWED_ORIGINS: "*"
      VERIFICATION_AGENT_URL: http://verification-agent:8000
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
    volumes:
      - ./integrators:/integrators:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    image: ghcr.io/mateuszkalinowski-ops/oip/dashboard:latest
    expose:
      - "80"
    environment:
      PINQUARK_API_URL: ""
      PINQUARK_API_KEY: ""
      PINQUARK_ADMIN_SECRET: ${ADMIN_SECRET:-}
    depends_on:
      - platform
    restart: unless-stopped

  # --- Infrastructure ---
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "oip-vps-kafka-cluster-01"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: pinquark_platform
      POSTGRES_USER: pinquark
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pinquark}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinquark -d pinquark_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Verification Agent ---
  verification-agent:
    image: ghcr.io/mateuszkalinowski-ops/oip/verification-agent:latest
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD:-pinquark}@postgres:5432/pinquark_platform
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      VERIFICATION_INTERVAL_DAYS: 7
      VERIFICATION_TIMEOUT_SECONDS: 60
      CONNECTOR_DISCOVERY_PATH: /integrators
      LOG_LEVEL: INFO
    volumes:
      - ./integrators:/integrators:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Connectors ---
  connector-inpost-v3:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-inpost-v3:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-dhl:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-dhl:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped

  connector-allegro:
    image: ghcr.io/mateuszkalinowski-ops/oip/connector-allegro:latest
    environment:
      APP_ENV: production
      APP_PORT: 8000
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
