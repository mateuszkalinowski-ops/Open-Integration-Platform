x-connector-healthcheck: &connector-healthcheck
  test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 15s

services:
  # --- Core Platform ---
  platform:
    build:
      context: .
      dockerfile: platform/Dockerfile
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinquark:${DB_PASSWORD}@postgres:5432/pinquark_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CONNECTOR_DISCOVERY_PATH: /integrators
      APP_ENV: production
      LOG_LEVEL: INFO
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      DEMO_MODE: ${DEMO_MODE:-false}
      DEFAULT_API_KEY: ${PINQUARK_DASHBOARD_API_KEY:-}
    volumes:
      - ./integrators:/integrators:ro
      - ./onpremise:/onpremise:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  dashboard:
    build:
      context: ./platform/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      PINQUARK_API_URL: ""
    depends_on:
      - platform
    restart: unless-stopped

  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pinquark_platform
      POSTGRES_USER: pinquark
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinquark -d pinquark_platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # --- Connectors (add/remove as needed) ---
  connector-inpost-v1:
    build:
      context: ./integrators/courier/inpost/v1.0.0
    environment:
      APP_ENV: production
      APP_PORT: 8000
    depends_on:
      - platform
    restart: unless-stopped
    healthcheck: *connector-healthcheck

