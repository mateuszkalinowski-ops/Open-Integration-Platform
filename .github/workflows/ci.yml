name: CI — Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".github/dependabot.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".github/dependabot.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/oip

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      verification-agent: ${{ steps.filter.outputs.verification-agent }}
      connectors: ${{ steps.filter.outputs.connectors }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            platform:
              - 'platform/api/**'
              - 'platform/core/**'
              - 'platform/db/**'
              - 'platform/middleware/**'
              - 'platform/Dockerfile'
              - 'platform/requirements.txt'
              - 'platform/entrypoint.sh'
              - 'platform/config.py'
              - 'shared/python/**'
            dashboard:
              - 'platform/dashboard/**'
            verification-agent:
              - 'platform/verification-agent/**'
              - 'shared/python/**'
            connectors:
              - 'integrators/**'
              - 'shared/python/**'
            shared:
              - 'shared/python/**'

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Ruff check
        run: ruff check platform/ integrators/ --config ruff.toml --output-format=github

      - name: Ruff format check
        run: ruff format --check platform/ integrators/ --config ruff.toml

  test:
    name: Test Platform & Connectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared library
        run: pip install -e shared/python/

      - name: Test shared library
        run: |
          pip install pytest pytest-asyncio
          cd shared/python && python -m pytest tests/ -v --tb=short

      - name: Test platform
        run: |
          grep -v 'file:///shared/python' platform/requirements.txt > /tmp/platform-reqs.txt
          pip install -r /tmp/platform-reqs.txt
          pip install pytest pytest-asyncio pytest-cov httpx
          cd platform && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term

      - name: Test connectors
        run: |
          pip install pytest pytest-asyncio httpx
          FAILED=0
          for dir in integrators/courier/*/v1.0.0 integrators/ecommerce/*/v1.0.0 integrators/other/*/v1.0.0; do
            if [ -d "$dir/tests" ] && [ -f "$dir/requirements.txt" ]; then
              echo "--- Testing $dir ---"
              pip install -r "$dir/requirements.txt"
              if [ -f "$dir/requirements-dev.txt" ]; then
                pip install -r "$dir/requirements-dev.txt"
              fi
              rc=0
              (cd "$dir" && python -m pytest tests/ -v --tb=short) || rc=$?
              if [ $rc -ne 0 ] && [ $rc -ne 5 ]; then
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit platform
        run: |
          pip install pip-audit
          grep -v 'file://' platform/requirements.txt > /tmp/audit-reqs.txt
          pip-audit -r /tmp/audit-reqs.txt --ignore-vuln PYSEC-0

      - name: npm audit dashboard
        run: |
          cd platform/dashboard && npm audit --audit-level=critical --omit=dev

  build-platform:
    name: Build Platform
    needs: [changes, lint, test, security-scan]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && (needs.changes.outputs.platform == 'true' || needs.changes.outputs.shared == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build platform image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/Dockerfile
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan platform image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/platform:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push platform image
        run: |
          docker tag ${{ env.IMAGE_PREFIX }}/platform:${{ github.sha }} ${{ env.IMAGE_PREFIX }}/platform:latest
          docker push ${{ env.IMAGE_PREFIX }}/platform:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/platform:latest

  build-dashboard:
    name: Build Dashboard
    needs: [changes, lint, test, security-scan]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && needs.changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build dashboard image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./platform/dashboard
          file: platform/dashboard/Dockerfile
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan dashboard image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/dashboard:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push dashboard image
        run: |
          docker tag ${{ env.IMAGE_PREFIX }}/dashboard:${{ github.sha }} ${{ env.IMAGE_PREFIX }}/dashboard:latest
          docker push ${{ env.IMAGE_PREFIX }}/dashboard:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/dashboard:latest

  build-verification-agent:
    name: Build Verification Agent
    needs: [changes, lint, test, security-scan]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && (needs.changes.outputs.verification-agent == 'true' || needs.changes.outputs.shared == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build verification-agent image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/verification-agent/Dockerfile
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/verification-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan verification-agent image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/verification-agent:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push verification-agent image
        run: |
          docker tag ${{ env.IMAGE_PREFIX }}/verification-agent:${{ github.sha }} ${{ env.IMAGE_PREFIX }}/verification-agent:latest
          docker push ${{ env.IMAGE_PREFIX }}/verification-agent:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/verification-agent:latest

  build-connectors:
    name: Build ${{ matrix.name }}
    needs: [changes, lint, test, security-scan]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && (needs.changes.outputs.connectors == 'true' || needs.changes.outputs.shared == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: connector-inpost-v3
            context: .
            dockerfile: integrators/courier/inpost/v3.0.0/Dockerfile
          - name: connector-dhl
            context: ./integrators/courier/dhl/v1.0.0
            dockerfile: ./integrators/courier/dhl/v1.0.0/Dockerfile
          - name: connector-allegro
            context: .
            dockerfile: integrators/ecommerce/allegro/v1.0.0/Dockerfile
          - name: connector-baselinker
            context: .
            dockerfile: integrators/ecommerce/baselinker/v1.0.0/Dockerfile
          - name: connector-shopify
            context: .
            dockerfile: integrators/ecommerce/shopify/v1.0.0/Dockerfile
          - name: connector-fxcouriers
            context: ./integrators/courier/fxcouriers/v1.0.0
            dockerfile: ./integrators/courier/fxcouriers/v1.0.0/Dockerfile
          - name: connector-pinquark-wms
            context: .
            dockerfile: integrators/wms/pinquark-wms/v1.0.0/Dockerfile
          - name: connector-email-client
            context: .
            dockerfile: integrators/other/email-client/v1.0.0/Dockerfile
          - name: connector-skanuj-fakture
            context: .
            dockerfile: integrators/other/skanuj-fakture/v1.0.0/Dockerfile
          - name: connector-ftp-sftp
            context: .
            dockerfile: integrators/other/ftp-sftp/v1.0.0/Dockerfile
          - name: connector-slack
            context: .
            dockerfile: integrators/other/slack/v1.0.0/Dockerfile
          - name: connector-bulkgate
            context: ./integrators/other/bulkgate/v1.0.0
            dockerfile: ./integrators/other/bulkgate/v1.0.0/Dockerfile
          # --- Courier connectors ---
          - name: connector-inpost-v1
            context: ./integrators/courier/inpost/v1.0.0
            dockerfile: ./integrators/courier/inpost/v1.0.0/Dockerfile
          - name: connector-inpost-v2
            context: ./integrators/courier/inpost/v2.0.0
            dockerfile: ./integrators/courier/inpost/v2.0.0/Dockerfile
          - name: connector-dhl-express
            context: ./integrators/courier/dhl-express/v1.0.0
            dockerfile: ./integrators/courier/dhl-express/v1.0.0/Dockerfile
          - name: connector-dpd
            context: ./integrators/courier/dpd/v1.0.0
            dockerfile: ./integrators/courier/dpd/v1.0.0/Dockerfile
          - name: connector-fedex
            context: ./integrators/courier/fedex/v1.0.0
            dockerfile: ./integrators/courier/fedex/v1.0.0/Dockerfile
          - name: connector-fedexpl
            context: ./integrators/courier/fedexpl/v1.0.0
            dockerfile: ./integrators/courier/fedexpl/v1.0.0/Dockerfile
          - name: connector-geis
            context: ./integrators/courier/geis/v1.0.0
            dockerfile: ./integrators/courier/geis/v1.0.0/Dockerfile
          - name: connector-gls
            context: ./integrators/courier/gls/v1.0.0
            dockerfile: ./integrators/courier/gls/v1.0.0/Dockerfile
          - name: connector-orlenpaczka
            context: ./integrators/courier/orlenpaczka/v1.0.0
            dockerfile: ./integrators/courier/orlenpaczka/v1.0.0/Dockerfile
          - name: connector-packeta
            context: ./integrators/courier/packeta/v1.0.0
            dockerfile: ./integrators/courier/packeta/v1.0.0/Dockerfile
          - name: connector-paxy
            context: ./integrators/courier/paxy/v1.0.0
            dockerfile: ./integrators/courier/paxy/v1.0.0/Dockerfile
          - name: connector-pocztapolska
            context: ./integrators/courier/pocztapolska/v1.0.0
            dockerfile: ./integrators/courier/pocztapolska/v1.0.0/Dockerfile
          - name: connector-schenker
            context: ./integrators/courier/schenker/v1.0.0
            dockerfile: ./integrators/courier/schenker/v1.0.0/Dockerfile
          - name: connector-sellasist
            context: ./integrators/courier/sellasist/v1.0.0
            dockerfile: ./integrators/courier/sellasist/v1.0.0/Dockerfile
          - name: connector-suus
            context: ./integrators/courier/suus/v1.0.0
            dockerfile: ./integrators/courier/suus/v1.0.0/Dockerfile
          - name: connector-ups
            context: ./integrators/courier/ups/v1.0.0
            dockerfile: ./integrators/courier/ups/v1.0.0/Dockerfile
          - name: connector-raben
            context: ./integrators/courier/raben/v1.0.0
            dockerfile: ./integrators/courier/raben/v1.0.0/Dockerfile
          # --- E-commerce connectors ---
          - name: connector-shoper
            context: .
            dockerfile: integrators/ecommerce/shoper/v1.0.0/Dockerfile
          - name: connector-idosell
            context: .
            dockerfile: integrators/ecommerce/idosell/v1.0.0/Dockerfile
          - name: connector-woocommerce
            context: .
            dockerfile: integrators/ecommerce/woocommerce/v1.0.0/Dockerfile
          - name: connector-amazon
            context: .
            dockerfile: integrators/ecommerce/amazon/v1.0.0/Dockerfile
          - name: connector-apilo
            context: .
            dockerfile: integrators/ecommerce/apilo/v1.0.0/Dockerfile
          # --- ERP connectors ---
          - name: connector-insert-nexo
            context: .
            dockerfile: integrators/erp/insert-nexo/v1.0.0/Dockerfile
          # --- AI connectors ---
          - name: connector-ai-agent
            context: ./integrators/ai/agent/v1.0.0
            dockerfile: ./integrators/ai/agent/v1.0.0/Dockerfile
          # --- Other connectors ---
          - name: connector-s3
            context: .
            dockerfile: integrators/other/s3/v1.0.0/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan ${{ matrix.name }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push ${{ matrix.name }} image
        run: |
          docker tag ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }} ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
