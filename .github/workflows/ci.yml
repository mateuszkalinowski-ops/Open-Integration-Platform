name: CI — Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/oip

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Ruff check
        run: ruff check platform/ integrators/ --output-format=github

      - name: Ruff format check
        run: ruff format --check platform/ integrators/

  build-platform:
    name: Build Platform
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/platform:latest
            ${{ env.IMAGE_PREFIX }}/platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./platform/dashboard
          file: platform/dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dashboard:latest
            ${{ env.IMAGE_PREFIX }}/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-connectors:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: connector-inpost-v3
            context: ./integrators/courier/inpost/v3.0.0
            dockerfile: ./integrators/courier/inpost/v3.0.0/Dockerfile
          - name: connector-dhl
            context: ./integrators/courier/dhl/v1.0.0
            dockerfile: ./integrators/courier/dhl/v1.0.0/Dockerfile
          - name: connector-allegro
            context: .
            dockerfile: integrators/ecommerce/allegro/v1.0.0/Dockerfile
          - name: connector-baselinker
            context: .
            dockerfile: integrators/ecommerce/baselinker/v1.0.0/Dockerfile
          - name: connector-shopify
            context: .
            dockerfile: integrators/ecommerce/shopify/v1.0.0/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
