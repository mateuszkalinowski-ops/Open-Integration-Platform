name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Build & Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy, configure and verify
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/pinquark

            # ── Fetch deploy bundle via GitHub API (single HTTPS call, no SCP) ──
            REPO="${{ github.repository }}"
            SHA="${{ github.sha }}"
            curl -sL \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/tarball/${SHA}" \
              -o /tmp/repo.tar.gz

            TMPDIR=$(mktemp -d)
            tar xzf /tmp/repo.tar.gz -C "$TMPDIR" --strip-components=1
            cp "$TMPDIR/docker-compose.vps.yml" /opt/pinquark/docker-compose.vps.yml
            mkdir -p /opt/pinquark/deploy
            cp "$TMPDIR/deploy/nginx.conf" /opt/pinquark/deploy/nginx.conf.template

            rm -rf /opt/pinquark/integrators
            mkdir -p /opt/pinquark/integrators
            find "$TMPDIR/integrators" -name "connector.yaml" | while read f; do
              REL="${f#$TMPDIR/integrators/}"
              DIR="/opt/pinquark/integrators/$(dirname "$REL")"
              mkdir -p "$DIR"
              cp "$f" "$DIR/"
            done
            rm -rf "$TMPDIR" /tmp/repo.tar.gz

            # ── Docker login & pull ──
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Preserve or generate API key ──
            if [ -f .env ] && grep -q DEFAULT_API_KEY .env; then
              EXISTING_KEY=$(grep DEFAULT_API_KEY .env | cut -d= -f2-)
            fi
            DEFAULT_KEY="${{ secrets.DEFAULT_API_KEY }}"
            if [ -z "$DEFAULT_KEY" ]; then
              DEFAULT_KEY="${EXISTING_KEY:-pk_live_$(openssl rand -hex 16)}"
            fi

            DOMAIN="${{ secrets.DOMAIN }}"
            printf '%s\n' \
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              "DB_APP_PASSWORD=${{ secrets.DB_APP_PASSWORD }}" \
              "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
              "DEFAULT_API_KEY=${DEFAULT_KEY}" \
              "ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}" \
              "INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}" \
              "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" \
              "KAFKA_SASL_PASSWORD=${{ secrets.KAFKA_SASL_PASSWORD }}" \
              "DOMAIN=${DOMAIN}" \
              "GITHUB_ORG=${{ github.repository_owner }}" \
              "DEMO_MODE=${{ secrets.DEMO_MODE || 'false' }}" \
              "TRUSTED_PROXY_IPS=172.18.0.0/16" \
              "IMAGE_TAG=${SHA}" \
              > .env

            # ── Template nginx.conf with actual domain ──
            ESCAPED_DOMAIN=$(printf '%s\n' "${DOMAIN}" | sed 's/[&/\]/\\&/g')
            sed "s/\${DOMAIN}/${ESCAPED_DOMAIN}/g" /opt/pinquark/deploy/nginx.conf.template \
              > /opt/pinquark/deploy/nginx.conf

            # ── SSL certificate (Let's Encrypt) ──
            CERT_DIR="/opt/pinquark/certbot/conf/live/${DOMAIN}"
            CONF_BASE="/opt/pinquark/certbot/conf"
            mkdir -p /opt/pinquark/certbot/www "$CONF_BASE"

            NEED_CERT=""
            if ! sudo test -f "$CERT_DIR/fullchain.pem"; then
              NEED_CERT=1
            elif ! sudo openssl x509 -in "$CERT_DIR/fullchain.pem" -noout -issuer 2>/dev/null | grep -qi "let's encrypt\|R3\|R10\|R11\|E5\|E6"; then
              echo "Cert exists but is not from Let's Encrypt — cleaning up"
              sudo rm -rf "$CONF_BASE"/live/${DOMAIN}*
              sudo rm -rf "$CONF_BASE"/archive/${DOMAIN}*
              sudo rm -rf "$CONF_BASE"/renewal/${DOMAIN}*
              NEED_CERT=1
            else
              echo "Valid Let's Encrypt certificate found — skipping certbot"
              sudo chmod -R 755 "$CONF_BASE"/live "$CONF_BASE"/archive 2>/dev/null || true
            fi

            if [ "$NEED_CERT" = "1" ]; then
              echo "Obtaining Let's Encrypt certificate via standalone mode..."
              docker compose -f docker-compose.vps.yml stop nginx 2>/dev/null || true
              sudo lsof -ti:80 | xargs -r sudo kill -9 2>/dev/null || true
              sleep 2
              docker run --rm \
                -v "$CONF_BASE":/etc/letsencrypt \
                -v /opt/pinquark/certbot/www:/var/www/certbot \
                -p 80:80 \
                certbot/certbot certonly \
                --standalone \
                --non-interactive \
                --cert-name ${DOMAIN} \
                --email ${{ secrets.CERTBOT_EMAIL }} \
                --agree-tos --no-eff-email \
                -d ${DOMAIN} \
                || echo "WARNING: certbot failed — self-signed fallback will be created"
              sudo chmod -R 755 "$CONF_BASE"/live "$CONF_BASE"/archive 2>/dev/null || true
            fi

            if ! sudo test -f "$CERT_DIR/fullchain.pem"; then
              echo "No certificate found — creating self-signed fallback so Nginx can start"
              sudo mkdir -p "$CERT_DIR"
              sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout "$CERT_DIR/privkey.pem" \
                -out "$CERT_DIR/fullchain.pem" \
                -subj "/CN=${DOMAIN}" 2>/dev/null
              sudo chmod -R 755 "$CONF_BASE"/live 2>/dev/null || true
            fi

            # Pull images; if any SHA-tagged image is missing, fall back to "latest"
            if ! docker compose -f docker-compose.vps.yml pull 2>&1; then
              echo "Some images missing for tag ${SHA} — falling back to latest"
              sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=latest/' .env
              docker compose -f docker-compose.vps.yml pull
            fi

            # Clear stale Kafka data if cluster ID changed
            docker compose -f docker-compose.vps.yml down kafka 2>/dev/null || true
            docker volume rm pinquark_kafkadata 2>/dev/null || true

            # Ensure infra is up before app services (Kafka needs start_period)
            docker compose -f docker-compose.vps.yml up -d postgres redis kafka
            echo "Waiting for Postgres to be ready..."
            for i in $(seq 1 20); do
              if docker compose -f docker-compose.vps.yml exec -T postgres pg_isready -U pinquark -d pinquark_platform > /dev/null 2>&1; then
                break
              fi
              sleep 2
            done

            # Create/update pinquark_app role on existing database
            DB_APP_PW=$(grep DB_APP_PASSWORD .env | cut -d= -f2-)
            docker compose -f docker-compose.vps.yml exec -T postgres psql -U pinquark -d pinquark_platform -c "
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'pinquark_app') THEN
                  CREATE ROLE pinquark_app LOGIN PASSWORD '${DB_APP_PW}';
                ELSE
                  ALTER ROLE pinquark_app PASSWORD '${DB_APP_PW}';
                END IF;
              END
              \$\$;
              GRANT CONNECT ON DATABASE pinquark_platform TO pinquark_app;
              GRANT USAGE ON SCHEMA public TO pinquark_app;
              GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO pinquark_app;
              GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO pinquark_app;
            " || echo "WARNING: pinquark_app role setup failed"

            docker compose -f docker-compose.vps.yml up -d --remove-orphans || {
              echo "=== docker compose up failed — dumping infra logs ==="
              docker compose -f docker-compose.vps.yml logs kafka --tail=60 2>&1 || true
              docker compose -f docker-compose.vps.yml logs redis --tail=30 2>&1 || true
              docker compose -f docker-compose.vps.yml logs postgres --tail=30 2>&1 || true
              exit 1
            }

            sleep 5
            docker compose -f docker-compose.vps.yml restart nginx

            docker image prune -f

            # ── Health check (via HTTP /health — not redirected) ──
            echo "Waiting for platform to start..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:80/health > /dev/null 2>&1; then
                echo "Platform is healthy!"
                exit 0
              fi
              echo "Attempt $i/30 - waiting..."
              sleep 5
            done
            echo "Health check failed after 30 attempts"
            docker compose -f docker-compose.vps.yml logs --tail=80
            exit 1
