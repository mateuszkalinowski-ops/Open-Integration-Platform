name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Build & Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare connector manifests
        run: |
          mkdir -p _manifests
          find integrators -name "connector.yaml" | while read f; do
            dir="_manifests/$(dirname "$f")"
            mkdir -p "$dir"
            cp "$f" "$dir/"
          done

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.vps.yml,deploy/nginx.conf,_manifests/integrators"
          target: /opt/pinquark
          overwrite: true

      - name: Place connector manifests
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /opt/pinquark/integrators
            mv /opt/pinquark/_manifests/integrators /opt/pinquark/integrators
            rm -rf /opt/pinquark/_manifests

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/pinquark

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            if [ -f .env ] && grep -q DEFAULT_API_KEY .env; then
              EXISTING_KEY=$(grep DEFAULT_API_KEY .env | cut -d= -f2-)
            fi
            DEFAULT_KEY="${{ secrets.DEFAULT_API_KEY }}"
            if [ -z "$DEFAULT_KEY" ]; then
              DEFAULT_KEY="${EXISTING_KEY:-pk_live_$(openssl rand -hex 16)}"
            fi

            printf '%s\n' \
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
              "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" \
              "DEFAULT_API_KEY=${DEFAULT_KEY}" \
              > .env

            docker compose -f docker-compose.vps.yml pull
            docker compose -f docker-compose.vps.yml up -d --remove-orphans

            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Waiting for platform to start..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:80/health > /dev/null 2>&1; then
                echo "Platform is healthy!"
                exit 0
              fi
              echo "Attempt $i/30 - waiting..."
              sleep 5
            done
            echo "Health check failed after 30 attempts"
            docker compose -f /opt/pinquark/docker-compose.vps.yml logs --tail=50
            exit 1
