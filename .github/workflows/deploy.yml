name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Build & Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build deploy bundle
        run: |
          mkdir -p _bundle/deploy _bundle/integrators
          cp docker-compose.vps.yml _bundle/
          cp deploy/nginx.conf _bundle/deploy/
          find integrators -name "connector.yaml" | while read f; do
            dir="_bundle/integrators/$(dirname "$f" | sed 's|^integrators/||')"
            mkdir -p "$dir"
            cp "$f" "$dir/"
          done
          tar czf /tmp/pinquark-deploy.tar.gz -C _bundle .

      - name: Deploy, configure and verify
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_BUNDLE: ${{ github.workspace }}/pinquark-deploy.tar.gz
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/pinquark

            # ── Fetch deploy bundle via GitHub API (single HTTPS call, no SCP) ──
            REPO="${{ github.repository }}"
            SHA="${{ github.sha }}"
            curl -sL \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/tarball/${SHA}" \
              -o /tmp/repo.tar.gz

            TMPDIR=$(mktemp -d)
            tar xzf /tmp/repo.tar.gz -C "$TMPDIR" --strip-components=1
            cp "$TMPDIR/docker-compose.vps.yml" /opt/pinquark/docker-compose.vps.yml
            mkdir -p /opt/pinquark/deploy
            cp "$TMPDIR/deploy/nginx.conf" /opt/pinquark/deploy/nginx.conf

            rm -rf /opt/pinquark/integrators
            mkdir -p /opt/pinquark/integrators
            find "$TMPDIR/integrators" -name "connector.yaml" | while read f; do
              REL="${f#$TMPDIR/integrators/}"
              DIR="/opt/pinquark/integrators/$(dirname "$REL")"
              mkdir -p "$DIR"
              cp "$f" "$DIR/"
            done
            rm -rf "$TMPDIR" /tmp/repo.tar.gz

            # ── Docker login & pull ──
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Preserve or generate API key ──
            if [ -f .env ] && grep -q DEFAULT_API_KEY .env; then
              EXISTING_KEY=$(grep DEFAULT_API_KEY .env | cut -d= -f2-)
            fi
            DEFAULT_KEY="${{ secrets.DEFAULT_API_KEY }}"
            if [ -z "$DEFAULT_KEY" ]; then
              DEFAULT_KEY="${EXISTING_KEY:-pk_live_$(openssl rand -hex 16)}"
            fi

            printf '%s\n' \
              "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
              "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" \
              "DEFAULT_API_KEY=${DEFAULT_KEY}" \
              "ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}" \
              "DEMO_MODE=true" \
              > .env

            # ── SSL certificate (Let's Encrypt) ──
            CERT_DIR="/opt/pinquark/certbot/conf/live/pq.dotts.pl"
            CONF_BASE="/opt/pinquark/certbot/conf"
            mkdir -p /opt/pinquark/certbot/www "$CONF_BASE"

            NEED_CERT=""
            if ! sudo test -f "$CERT_DIR/fullchain.pem"; then
              NEED_CERT=1
            elif ! sudo openssl x509 -in "$CERT_DIR/fullchain.pem" -noout -issuer 2>/dev/null | grep -qi "let's encrypt\|R3\|R10\|R11\|E5\|E6"; then
              echo "Cert exists but is not from Let's Encrypt — cleaning up"
              sudo rm -rf "$CONF_BASE"/live/pq.dotts.pl*
              sudo rm -rf "$CONF_BASE"/archive/pq.dotts.pl*
              sudo rm -rf "$CONF_BASE"/renewal/pq.dotts.pl*
              NEED_CERT=1
            else
              echo "Valid Let's Encrypt certificate found — skipping certbot"
              sudo chmod -R 755 "$CONF_BASE"/live "$CONF_BASE"/archive 2>/dev/null || true
            fi

            if [ "$NEED_CERT" = "1" ]; then
              echo "Obtaining Let's Encrypt certificate via standalone mode..."
              docker compose -f docker-compose.vps.yml stop nginx 2>/dev/null || true
              sudo lsof -ti:80 | xargs -r sudo kill -9 2>/dev/null || true
              sleep 2
              docker run --rm \
                -v "$CONF_BASE":/etc/letsencrypt \
                -v /opt/pinquark/certbot/www:/var/www/certbot \
                -p 80:80 \
                certbot/certbot certonly \
                --standalone \
                --non-interactive \
                --cert-name pq.dotts.pl \
                --email integrations@pinquark.com \
                --agree-tos --no-eff-email \
                -d pq.dotts.pl \
                || echo "WARNING: certbot failed, will use self-signed fallback"
              sudo chmod -R 755 "$CONF_BASE"/live "$CONF_BASE"/archive 2>/dev/null || true
            fi

            if ! sudo test -f "$CERT_DIR/fullchain.pem"; then
              echo "No certificate found — creating self-signed fallback so Nginx can start"
              sudo mkdir -p "$CERT_DIR"
              sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout "$CERT_DIR/privkey.pem" \
                -out "$CERT_DIR/fullchain.pem" \
                -subj "/CN=pq.dotts.pl" 2>/dev/null
              sudo chmod -R 755 "$CONF_BASE"/live 2>/dev/null || true
            fi

            docker compose -f docker-compose.vps.yml pull
            docker compose -f docker-compose.vps.yml up -d --remove-orphans

            sleep 5
            docker compose -f docker-compose.vps.yml restart nginx

            docker image prune -f

            # ── Health check (via HTTP /health — not redirected) ──
            echo "Waiting for platform to start..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:80/health > /dev/null 2>&1; then
                echo "Platform is healthy!"
                exit 0
              fi
              echo "Attempt $i/30 - waiting..."
              sleep 5
            done
            echo "Health check failed after 30 attempts"
            docker compose -f docker-compose.vps.yml logs --tail=50
            exit 1
