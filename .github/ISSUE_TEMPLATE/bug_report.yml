name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: connector
    attributes:
      label: Connector / Component
      description: Which connector or platform component is affected?
      placeholder: e.g. courier/dhl, ecommerce/allegro, platform/api
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Configure connector with ...
        2. Send request to ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste any relevant logs (redact credentials!).
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Connector version or commit SHA.
      placeholder: e.g. v1.0.0 or abc1234

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Docker Compose (self-hosted)
        - Kubernetes
        - SaaS
        - Other
