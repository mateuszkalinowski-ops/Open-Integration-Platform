name: pinquark-wms
category: wms
version: 1.0.0
display_name: "Pinquark WMS"
description: "Pinquark WMS warehouse management system — articles, documents, contractors, stock positions, batches."
website_url: "https://pinquark.com"
country: PL
logo_url: /assets/logos/pinquark-wms.png
interface: wms

capabilities:
