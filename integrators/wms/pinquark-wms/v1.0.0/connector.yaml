      type: string
    - field: success
      label: "Sukces"
      type: boolean
  contractor.create:
    - field: erpId
      label: "ID kontrahenta (ERP)"
      type: integer
    - field: wmsId
      label: "ID kontrahenta (WMS)"
      type: integer
    - field: name
      label: "Nazwa"
      type: string
    - field: symbol
      label: "Symbol"
      type: string
    - field: success
      label: "Sukces"
      type: boolean
  contractor.delete:
    - field: uniqueCode
      label: "Unikalny kod"
      type: string
    - field: success
      label: "Sukces"
      type: boolean
  position.create:
    - field: documentId
      label: "ID dokumentu"
      type: integer
    - field: count
      label: "Liczba utworzonych pozycji"
      type: integer
    - field: success
      label: "Sukces"
      type: boolean
  position.delete:
    - field: uniqueCode
