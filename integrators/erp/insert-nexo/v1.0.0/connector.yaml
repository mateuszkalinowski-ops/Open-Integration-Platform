name: insert-nexo
category: erp
version: 1.0.0
display_name: "InsERT Nexo (Subiekt)"
description: "Cloud connector for InsERT Nexo ERP (Subiekt) — proxies requests to the on-premise agent running at the client site. Supports contractors, products, sales & warehouse documents, orders, and stock levels."
website_url: "https://www.insert.com.pl"
country: PL
logo_url: /assets/logos/insert-nexo.svg
interface: erp
deployment: hybrid
requires_onpremise_agent: true
onpremise_agent:
  display_name: "InsERT Nexo On-Premise Agent"
  description: "Windows agent that connects directly to the InsERT Nexo ERP system (Subiekt, Rachmistrz, Rewizor, Gestor) via the Nexo SDK. Must be installed on a Windows machine with access to the Nexo SQL Server database."
  source_directory: "onpremise/nexo-agent"
  platform: windows
  requirements:
    - "Windows 10/11 or Windows Server 2016+"
    - "Python 3.12+"
    - ".NET 8.0 Runtime"
    - "InsERT Nexo SDK (v59.0+)"
    - "Network access to Nexo SQL Server"
  install_steps:
    - "Download and extract the agent package"
    - "Run the installer wizard (nexo-agent-setup.exe) or configure manually"
    - "Provide SQL Server connection details and Nexo credentials"
    - "Enter the Cloud Platform URL and API key"
    - "Start the agent as a Windows Service or manually"
capabilities:
  - list_contractors
  - get_contractor
  - create_contractor
  - update_contractor
  - delete_contractor
  - list_products
  - get_product
  - create_product
  - update_product
  - delete_product
  - list_sales_documents
  - get_sales_document
  - create_sales_document
  - list_warehouse_documents
  - get_warehouse_document
  - create_warehouse_document
  - list_orders
  - get_order
  - create_order
  - update_order
  - get_stock_levels
  - get_stock_for_product
events:
  - contractor.created
  - contractor.updated
  - product.created
  - product.updated
  - product.price_changed
  - document.sales.created
  - document.warehouse.created
  - order.created
  - order.status_changed
  - stock.level_changed
actions:
  - contractor.create
  - contractor.update
  - contractor.delete
  - contractor.list
  - contractor.get
  - product.create
  - product.update
  - product.delete
  - product.list
  - product.get
  - document.sales.create
  - document.sales.list
  - document.sales.get
  - document.warehouse.create
  - document.warehouse.list
  - document.warehouse.get
  - order.create
  - order.update
  - order.list
  - order.get
  - stock.levels
  - stock.get
config_schema:
  required:
    - agent_url
  optional:
    - agent_api_key
    - sync_enabled
  field_types:
    agent_url:
      type: string
      label: "On-premise agent URL (e.g. https://agent.client.local:8000)"
    agent_api_key:
      type: password
      label: "Agent API key for authentication"
    sync_enabled:
      type: boolean
      label: "Enable automatic sync from agent"
      default: true
health_endpoint: /health
docs_url: /docs
