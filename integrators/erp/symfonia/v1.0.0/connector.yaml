config_schema:
  required:
  - webapi_url
  - application_guid
  optional:
  - device_name
  - sync_interval_seconds
  - session_timeout_minutes
  field_types:
    webapi_url:
      type: string
      label: Symfonia WebAPI URL (e.g. https://192.168.1.100:8080)
    application_guid:
      type: password
      label: Application GUID (from Symfonia configurator)
    device_name:
      type: string
      label: Device name for session identification
      default: pinquark-oip
    sync_interval_seconds:
      type: integer
      label: Polling interval for incremental sync (seconds)
      default: 300
    session_timeout_minutes:
      type: integer
      label: Session timeout before renewal (minutes)
      default: 30
health_endpoint: /health
