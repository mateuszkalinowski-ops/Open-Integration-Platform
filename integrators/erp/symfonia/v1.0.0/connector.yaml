name: symfonia
category: erp
version: 1.0.0
display_name: Symfonia ERP (Handel & FK)
description: Connector for Symfonia ERP WebAPI — integrates with Symfonia Handel (trade, warehouse, sales,
  purchases) and Symfonia Finanse i Księgowość (finance & accounting) modules via REST/JSON API.
  Supports contractors, products, orders, sales & purchase documents, inventory states, and payments.
website_url: https://symfonia.pl/oprogramowanie/web-api/
country: PL
logo_url: /assets/logos/symfonia.svg
interface: erp
deployment: cloud
requires_onpremise_agent: false
capabilities:
- list_contractors
- get_contractor
- create_contractor
- update_contractor
- list_products
- get_product
- create_product
- update_product
- list_orders
- get_order
- list_sales_documents
- get_sales_document
- list_purchase_documents
- get_purchase_document
- get_stock_levels
- get_stock_for_product
- list_own_orders
- get_own_order
events:
- contractor.created
- contractor.updated
- product.created
- product.updated
- product.price_changed
- document.sales.created
- document.purchase.created
- order.created
- order.status_changed
- stock.level_changed
actions:
- contractor.create
- contractor.update
- contractor.list
- contractor.get
- contractor.filter
- product.create
- product.update
- product.list
- product.get
- product.filter
- document.sales.list
- document.sales.get
- document.sales.filter
- document.purchase.list
- document.purchase.get
- document.purchase.filter
- order.list
- order.get
- order.filter
- order.own.list
- order.own.get
- stock.levels
- stock.get
- stock.changes
- payment.list
action_routes:
  contractor.create:
    method: POST
    path: /api/v1/contractors
  contractor.update:
    method: PUT
    path: /api/v1/contractors
  contractor.list:
    method: GET
    path: /api/v1/contractors
  contractor.get:
    method: GET
    path: /api/v1/contractors/{contractor_id}
  contractor.filter:
    method: PATCH
    path: /api/v1/contractors/filter
  product.create:
    method: POST
    path: /api/v1/products
  product.update:
    method: PUT
    path: /api/v1/products
  product.list:
    method: GET
    path: /api/v1/products
  product.get:
    method: GET
    path: /api/v1/products/{product_id}
  product.filter:
    method: PATCH
    path: /api/v1/products/filter
  document.sales.list:
    method: GET
    path: /api/v1/sales
  document.sales.get:
    method: GET
    path: /api/v1/sales/{document_id}
  document.sales.filter:
    method: GET
    path: /api/v1/sales/filter
  document.purchase.list:
    method: GET
    path: /api/v1/purchases
  document.purchase.get:
    method: GET
    path: /api/v1/purchases/{document_id}
  document.purchase.filter:
    method: GET
    path: /api/v1/purchases/filter
  order.list:
    method: GET
    path: /api/v1/orders
  order.get:
    method: GET
    path: /api/v1/orders/{order_id}
  order.filter:
    method: GET
    path: /api/v1/orders/filter
  order.own.list:
    method: GET
    path: /api/v1/own-orders
  order.own.get:
    method: GET
    path: /api/v1/own-orders/{order_id}
  stock.levels:
    method: GET
    path: /api/v1/inventory
  stock.get:
    method: GET
    path: /api/v1/inventory/{product_id}
  stock.changes:
    method: GET
    path: /api/v1/inventory/changes
  payment.list:
    method: GET
    path: /api/v1/payments
credential_validation:
  test_request:
    method: GET
    path: /api/Ping
    expected_status: 200
