services:
  ftp-sftp-integrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftp-sftp-integrator
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ftp-sftp-data:/app/data
    env_file:
      - .env
    environment:
      - FTP_LOG_LEVEL=INFO
      - FTP_POLLING_ENABLED=false
      - FTP_POLLING_INTERVAL_SECONDS=300
    restart: unless-stopped
    networks:
      - integrations

  ftp-sftp-integrator-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftp-sftp-integrator-dev
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config:ro
      - ftp-sftp-data-dev:/app/data
    environment:
      - FTP_DEBUG=true
      - FTP_LOG_LEVEL=DEBUG
      - FTP_POLLING_ENABLED=false
      - KAFKA_ENABLED=false
      - DATABASE_URL=sqlite+aiosqlite:///./data/ftp_sftp_dev.db
    entrypoint: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev
    networks:
      - integrations

  sftp-server:
    image: atmoz/sftp:alpine
    container_name: sftp-test-server
    ports:
      - "2222:22"
    command: testuser:testpass:::upload
    profiles:
      - dev
      - test
    networks:
      - integrations

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ftp-sftp-tests
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./test.db
      - FTP_POLLING_ENABLED=false
      - KAFKA_ENABLED=false
    entrypoint: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    profiles:
      - test
    networks:
      - integrations

volumes:
  ftp-sftp-data:
  ftp-sftp-data-dev:

networks:
  integrations:
    driver: bridge
