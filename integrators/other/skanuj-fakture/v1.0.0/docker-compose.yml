services:
  skanuj-fakture-integrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skanuj-fakture-integrator
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - sf-data:/app/data
    env_file:
      - .env
    environment:
      - SF_LOG_LEVEL=INFO
      - SF_POLLING_ENABLED=true
      - SF_POLLING_INTERVAL_SECONDS=300
    restart: unless-stopped
    networks:
      - integrations

  skanuj-fakture-integrator-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skanuj-fakture-integrator-dev
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config:ro
      - sf-data-dev:/app/data
    environment:
      - SF_DEBUG=true
      - SF_LOG_LEVEL=DEBUG
      - SF_POLLING_ENABLED=false
      - KAFKA_ENABLED=false
      - DATABASE_URL=sqlite+aiosqlite:///./data/skanuj_fakture_dev.db
      - DATABASE_ENCRYPTION_KEY=
    entrypoint: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev
    networks:
      - integrations

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skanuj-fakture-tests
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./test.db
      - DATABASE_ENCRYPTION_KEY=
      - SF_POLLING_ENABLED=false
      - KAFKA_ENABLED=false
    entrypoint: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    profiles:
      - test
    networks:
      - integrations

volumes:
  sf-data:
  sf-data-dev:

networks:
  integrations:
    driver: bridge
