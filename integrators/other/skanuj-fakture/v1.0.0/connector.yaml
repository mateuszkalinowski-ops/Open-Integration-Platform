name: skanuj-fakture
category: other
version: 1.0.0
display_name: SkanujFakture
description: Integration with the SkanujFakture.pl invoice OCR system — automatic scanning, recognition and management of
  accounting documents with KSeF support.
website_url: https://skanujfakture.pl
country: PL
logo_url: /assets/logos/skanuj-fakture.svg
interface: invoice-ocr
capabilities:
- upload_document
- get_documents
- get_document_details
- update_document
- delete_documents
- get_document_file
- get_document_image
- edit_attributes
- manage_dictionaries
- get_ksef_xml
- get_ksef_qr
- send_ksef_invoice
- get_companies
- get_company_entities
events:
- document.scanned
- document.uploaded
actions:
- document.upload
- document.get
- document.list
- document.update
- document.delete
- document.file.get
- document.image.get
- document.attributes.edit
- document.attributes.delete
- dictionary.list
- dictionary.add
- ksef.xml.get
- ksef.qr.get
- ksef.invoice.send
- company.list
- company.entities.list
config_schema:
  required:
  - login
  - password
  optional:
  - api_url
  - company_id
  - polling_interval_seconds
  - polling_status_filter
  field_types:
    login:
      type: string
      label: Login (email)
      placeholder: user@example.com
      row: credentials
    password:
      type: password
      label: Haslo do konta SkanujFakture
      row: credentials
    api_url:
      type: string
      label: URL API SkanujFakture
      default: https://skanujfakture.pl:8443/SFApi
      row: connection
    company_id:
      type: integer
      label: ID firmy (opcjonalnie — automatycznie wykrywane)
      row: connection
    polling_interval_seconds:
      type: integer
      label: Interwal pollingu nowych dokumentow (sekundy)
      default: 300
      row: polling
    polling_status_filter:
      type: string
      label: Filtr statusow przy pollingu
      default: zeskanowany
      row: polling
