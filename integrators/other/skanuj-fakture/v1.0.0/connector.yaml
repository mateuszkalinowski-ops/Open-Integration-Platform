health_endpoint: /health
docs_url: /docs
service_name: connector-skanuj-fakture
action_routes:
  document.upload:
    method: POST
    path: /companies/{company_id}/documents
    query_from_payload:
    - account_name
    - single_document
    - sale
    multipart: true
  document.list:
    method: GET
    path: /companies/{company_id}/documents
    query_from_payload:
    - account_name
    - document_statuses
    - is_sale
  document.get:
    method: GET
    path: /companies/{company_id}/documents/{document_id}
    query_from_payload:
    - account_name
  document.update:
    method: PUT
    path: /companies/{company_id}/documents/{document_id}
    query_from_payload:
    - account_name
  document.delete:
    method: DELETE
    path: /companies/{company_id}/documents
    query_from_payload:
    - account_name
  document.file.get:
    method: GET
    path: /companies/{company_id}/documents/{document_id}/file
    query_from_payload:
    - account_name
  document.image.get:
    method: GET
    path: /companies/{company_id}/documents/{document_id}/image
    query_from_payload:
    - account_name
  company.list:
    method: GET
    path: /companies
    query_from_payload:
    - account_name
  ksef.xml.get:
    method: GET
    path: /companies/{company_id}/documents/{document_id}/ksef-xml
    query_from_payload:
    - account_name
  ksef.invoice.send:
    method: PUT
    path: /companies/{company_id}/ksef/invoice
    query_from_payload:
    - account_name
credential_provisioning:
  mode: account
  account_endpoint: /accounts
  payload_field: account_name
  credential_mapping:
    name: account_name
    login: login
    password: password
    api_url:
      source: api_url
      default: https://skanujfakture.pl:8443/SFApi
    company_id:
      source: company_id
      type: integer
      optional: true
    environment:
      source: environment
      default: production
credential_validation:
  required_fields:
  - login
  - password
  test_request:
    method: GET
    url_template: '{api_url}/users/currentUser/companies'
    auth: basic
    auth_fields:
    - login
    - password
    success_status: 200
    defaults:
      api_url: https://skanujfakture.pl:8443/SFApi
