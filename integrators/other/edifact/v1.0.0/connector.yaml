name: edifact
category: other
version: 1.0.0
display_name: "EDIFACT Container Terminal"
description: >
  REST/JSON connector for UN/EDIFACT container terminal messages.
  Supports CODECO, BAPLIE, IFTMIN, COPRAR, COPARN, COHAOR, COARRI,
  IFTSTA, APERAK, CONTRL. Includes raw EDIFACT parser/builder (pydifact).
interface: container-terminal
service_name: connector-edifact
country: global
website_url: https://unece.org/trade/uncefact/introducing-unedifact
documentation_url: https://service.unece.org/trade/untdid/d20b/trmd/trmdi1.htm
logo_url: /assets/logos/edifact.svg

capabilities:
  - codeco_gate_in
  - codeco_gate_out
  - codeco_status_change
  - baplie_bay_plan
  - baplie_stowage
  - iftmin_transport_instruction
  - iftmin_amendment
  - iftmin_cancellation
  - coprar_pre_advice
  - coparn_release_reservation
  - cohaor_handling_order
  - coarri_discharge_loading_report
  - iftsta_status_report
  - aperak_acknowledgement
  - contrl_syntax_ack
  - edifact_raw_parse
  - edifact_raw_build

events:
  - codeco.gate_in
  - codeco.gate_out
  - codeco.status_changed
  - baplie.plan_submitted
  - baplie.plan_updated
  - iftmin.instruction_issued
  - iftmin.instruction_amended
  - iftmin.instruction_cancelled
  - coprar.received
  - coparn.received
  - cohaor.received
  - coarri.generated
  - iftsta.generated
  - aperak.received
  - aperak.sent
  - contrl.received
  - contrl.sent

actions:
  - codeco.create
  - codeco.list
  - codeco.get
  - codeco.update
  - codeco.cancel
  - baplie.create
  - baplie.list
  - baplie.get
  - baplie.update
  - baplie.locations
  - iftmin.create
  - iftmin.list
  - iftmin.get
  - iftmin.amend
  - iftmin.cancel
  - coprar.create
  - coprar.get
  - coprar.list
  - coparn.create
  - coparn.get
  - coparn.list
  - cohaor.create
  - cohaor.get
  - cohaor.list
  - coarri.create
  - coarri.get
  - coarri.list
  - iftsta.create
  - iftsta.get
  - iftsta.list
  - aperak.send
  - aperak.list
  - contrl.send
  - contrl.list
  - edifact.parse
  - edifact.build

config_schema:
  required: []
  optional:
    - edifact_version
    - sender_id
    - receiver_id
    - smdg_profile
    - sequence_state_path
    - api_timeout_connect
    - api_timeout_read
    - max_retries
  field_types:
    edifact_version:
      type: string
      label: EDIFACT Version
      placeholder: "D_00B"
      description: "EDIFACT message version (D_95B, D_00B, D_01B)"
      default: "D_00B"
    sender_id:
      type: string
      label: Sender ID (UNB)
      placeholder: "PLMSCMAL01"
      description: "Interchange sender identification for UNB segment"
    receiver_id:
      type: string
      label: Receiver ID (UNB)
      placeholder: "METRANS"
      description: "Interchange receiver identification for UNB segment"
    smdg_profile:
      type: string
      label: SMDG Profile
      placeholder: "SMDG_2_0"
      description: "SMDG message profile version (SMDG_1_5, SMDG_2_0)"
      default: "SMDG_2_0"
    sequence_state_path:
      type: string
      label: Sequence State File Path
      placeholder: "/var/lib/oip/sequences/partner.json"
      description: "Path to persist UNB/UNH sequence numbers per partner"
    api_timeout_connect:
      type: number
      label: Connection Timeout (seconds)
      default: 30
    api_timeout_read:
      type: number
      label: Read Timeout (seconds)
      default: 60
    max_retries:
      type: number
      label: Max Retries
      default: 3

action_routes:
  codeco.create:
    method: POST
    path: /codeco/gate-events
    query_from_payload: []
  codeco.list:
    method: GET
    path: /codeco/gate-events
    query_from_payload: [account_name, event_type, container_id, vessel_name, un_locode, date_from, date_to, page, page_size]
  codeco.get:
    method: GET
    path: /codeco/gate-events/{event_id}
    query_from_payload: [account_name]
  codeco.update:
    method: PUT
    path: /codeco/gate-events/{event_id}
    query_from_payload: []
  codeco.cancel:
    method: DELETE
    path: /codeco/gate-events/{event_id}
    query_from_payload: [account_name]
  baplie.create:
    method: POST
    path: /baplie/bay-plans
    query_from_payload: []
  baplie.list:
    method: GET
    path: /baplie/bay-plans
    query_from_payload: [account_name, vessel_imo, vessel_name, voyage_number, plan_type, port_un_locode, date_from, date_to, page, page_size]
  baplie.get:
    method: GET
    path: /baplie/bay-plans/{plan_id}
    query_from_payload: [account_name]
  baplie.update:
    method: PUT
    path: /baplie/bay-plans/{plan_id}
    query_from_payload: []
  baplie.locations:
    method: GET
    path: /baplie/bay-plans/{plan_id}/locations
    query_from_payload: [account_name, bay, row, tier, is_empty]
  iftmin.create:
    method: POST
    path: /iftmin/instructions
    query_from_payload: []
  iftmin.list:
    method: GET
    path: /iftmin/instructions
    query_from_payload: [account_name, shipper_id, consignee_id, port_of_loading, port_of_discharge, vessel_name, date_from, date_to, function_code, page, page_size]
  iftmin.get:
    method: GET
    path: /iftmin/instructions/{instruction_id}
    query_from_payload: [account_name]
  iftmin.amend:
    method: PUT
    path: /iftmin/instructions/{instruction_id}
    query_from_payload: []
  iftmin.cancel:
    method: DELETE
    path: /iftmin/instructions/{instruction_id}
    query_from_payload: [account_name]

  coprar.create:
    method: POST
    path: /coprar/pre-advice
    query_from_payload: []
  coprar.get:
    method: GET
    path: /coprar/pre-advice/{message_id}
    query_from_payload: [account_name]
  coprar.list:
    method: GET
    path: /coprar/pre-advice
    query_from_payload: [account_name, function_code, page, page_size]

  coparn.create:
    method: POST
    path: /coparn/release-orders
    query_from_payload: []
  coparn.get:
    method: GET
    path: /coparn/release-orders/{message_id}
    query_from_payload: [account_name]
  coparn.list:
    method: GET
    path: /coparn/release-orders
    query_from_payload: [account_name, operation_type, page, page_size]

  cohaor.create:
    method: POST
    path: /cohaor/handling-orders
    query_from_payload: []
  cohaor.get:
    method: GET
    path: /cohaor/handling-orders/{message_id}
    query_from_payload: [account_name]
  cohaor.list:
    method: GET
    path: /cohaor/handling-orders
    query_from_payload: [account_name, operation_code, page, page_size]

  coarri.create:
    method: POST
    path: /coarri/reports
    query_from_payload: []
  coarri.get:
    method: GET
    path: /coarri/reports/{message_id}
    query_from_payload: [account_name]
  coarri.list:
    method: GET
    path: /coarri/reports
    query_from_payload: [account_name, report_type, page, page_size]

  iftsta.create:
    method: POST
    path: /iftsta/status-reports
    query_from_payload: []
  iftsta.get:
    method: GET
    path: /iftsta/status-reports/{message_id}
    query_from_payload: [account_name]
  iftsta.list:
    method: GET
    path: /iftsta/status-reports
    query_from_payload: [account_name, status_code, page, page_size]

  aperak.send:
    method: POST
    path: /aperak/acknowledgements
    query_from_payload: []
  aperak.list:
    method: GET
    path: /aperak/acknowledgements
    query_from_payload: [account_name, response_type, page, page_size]

  contrl.send:
    method: POST
    path: /contrl/syntax-ack
    query_from_payload: []
  contrl.list:
    method: GET
    path: /contrl/syntax-ack
    query_from_payload: [account_name, syntax_status, page, page_size]

  edifact.parse:
    method: POST
    path: /edifact/parse
    query_from_payload: []
  edifact.build:
    method: POST
    path: /edifact/build
    query_from_payload: []

credential_provisioning:
  mode: account
  account_endpoint: /accounts
  payload_field: account_name
  credential_mapping:
    name: account_name
    base_url: base_url
    api_key: api_key

credential_validation:
  required_fields: [base_url]
  optional_fields: [api_key]

health_endpoint: /health
docs_url: /docs

rate_limits:
  default: "100/min"
  per_action:
    codeco.create: "60/min"
    codeco.list: "120/min"
    codeco.get: "120/min"
    codeco.update: "60/min"
    codeco.cancel: "30/min"
    baplie.create: "30/min"
    baplie.list: "120/min"
    baplie.get: "120/min"
    baplie.update: "30/min"
    baplie.locations: "120/min"
    iftmin.create: "60/min"
    iftmin.list: "120/min"
    iftmin.get: "120/min"
    iftmin.amend: "60/min"
    iftmin.cancel: "30/min"
    coprar.create: "60/min"
    coprar.get: "120/min"
    coprar.list: "120/min"
    coparn.create: "60/min"
    coparn.get: "120/min"
    coparn.list: "120/min"
    cohaor.create: "60/min"
    cohaor.get: "120/min"
    cohaor.list: "120/min"
    coarri.create: "60/min"
    coarri.get: "120/min"
    coarri.list: "120/min"
    iftsta.create: "60/min"
    iftsta.get: "120/min"
    iftsta.list: "120/min"
    aperak.send: "120/min"
    aperak.list: "120/min"
    contrl.send: "120/min"
    contrl.list: "120/min"
    edifact.parse: "60/min"
    edifact.build: "60/min"

action_fields:
  codeco.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: document_id
      label: "Document ID"
      type: string
      required: true
    - field: event_type
      label: "Event Type"
      type: select
      required: true
      options:
        - value: gate_in
          label: "Gate In"
        - value: gate_out
          label: "Gate Out"
        - value: internal_move
          label: "Internal Move"
        - value: status_change
          label: "Status Change"
    - field: containers
      label: "Containers"
      type: array
      required: true

  baplie.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: document_id
      label: "Document ID"
      type: string
      required: true
    - field: plan_type
      label: "Plan Type"
      type: select
      required: true
      options:
        - value: provisional
          label: "Provisional"
        - value: final
          label: "Final"
        - value: actual
          label: "Actual"

  iftmin.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: instruction_id
      label: "Instruction ID"
      type: string
      required: true
    - field: goods_lines
      label: "Goods Lines"
      type: array
      required: true

  coprar.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: document_id
      label: "Document ID"
      type: string
      required: true
    - field: function_code
      label: "Function Code"
      type: select
      required: true
      options:
        - { value: "9", label: "Original" }
        - { value: "1", label: "Cancellation" }
        - { value: "5", label: "Replace" }
    - field: wagon_groups
      label: "Wagon Groups"
      type: array
      required: true
      description: "Array of {wagon_no, containers: [{container_no, ...}]}"

  coparn.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: document_id
      label: "Document ID"
      type: string
      required: true
    - field: operation_type
      label: "Operation Type"
      type: select
      required: true
      options:
        - { value: "release", label: "Release" }
        - { value: "reservation", label: "Reservation" }
        - { value: "drop_off", label: "Drop Off" }
        - { value: "pick_up", label: "Pick Up" }

  cohaor.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: document_id
      label: "Document ID"
      type: string
      required: true
    - field: operation_code
      label: "Operation Code"
      type: select
      required: true
      options:
        - { value: "load", label: "Load" }
        - { value: "discharge", label: "Discharge" }
        - { value: "shift", label: "Shift" }
        - { value: "inspection", label: "Inspection" }
        - { value: "weighing", label: "Weighing" }
        - { value: "reefer_check", label: "Reefer Check" }

  coarri.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: document_id
      label: "Document ID"
      type: string
      required: true
    - field: report_type
      label: "Report Type"
      type: select
      required: true
      options:
        - { value: "discharge", label: "Discharge Report" }
        - { value: "loading", label: "Loading Report" }
    - field: containers
      label: "Containers"
      type: array
      required: true

  iftsta.create:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: document_id
      label: "Document ID"
      type: string
      required: true
    - field: status_code
      label: "SMDG Status Code"
      type: select
      required: false
      options:
        - { value: "GTI", label: "Gate In" }
        - { value: "GTO", label: "Gate Out" }
        - { value: "DIS", label: "Discharge" }
        - { value: "LOA", label: "Loading" }
        - { value: "RES", label: "Restow" }
        - { value: "SHI", label: "Shifted" }

  aperak.send:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: referenced_message_ref
      label: "Referenced Message Ref"
      type: string
      required: true
    - field: response_type
      label: "Response Type"
      type: select
      required: true
      options:
        - { value: "accepted", label: "Accepted" }
        - { value: "rejected", label: "Rejected" }
        - { value: "accepted_with_errors", label: "Accepted with Errors" }

  contrl.send:
    - field: account_name
      label: "Account Name"
      type: string
      required: false
      default: "default"
    - field: referenced_interchange_ref
      label: "Referenced Interchange Ref"
      type: string
      required: true
    - field: syntax_status
      label: "Syntax Status"
      type: select
      required: true
      options:
        - { value: "ok", label: "OK" }
        - { value: "error", label: "Error" }

  edifact.parse:
    - field: content
      label: "Raw EDIFACT Content"
      type: text
      required: true
      description: "UNB+...UNZ raw EDIFACT interchange string"

  edifact.build:
    - field: msg_type
      label: "Message Type"
      type: select
      required: true
      options:
        - { value: "COPRAR", label: "COPRAR" }
        - { value: "COPARN", label: "COPARN" }
        - { value: "COHAOR", label: "COHAOR" }
        - { value: "COARRI", label: "COARRI" }
        - { value: "CODECO", label: "CODECO" }
        - { value: "IFTMIN", label: "IFTMIN" }
        - { value: "IFTSTA", label: "IFTSTA" }
        - { value: "APERAK", label: "APERAK" }
        - { value: "CONTRL", label: "CONTRL" }
    - field: sender_id
      label: "Sender ID"
      type: string
      required: true
    - field: receiver_id
      label: "Receiver ID"
      type: string
      required: true
    - field: body
      label: "Message Body (JSON)"
      type: object
      required: true

