services:
  edifact-connector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edifact-connector
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
    env_file:
      - .env
    environment:
      - EDIFACT_LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - integrations

  edifact-connector-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edifact-connector-dev
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config:ro
    environment:
      - EDIFACT_DEBUG=true
      - EDIFACT_LOG_LEVEL=DEBUG
      - EDIFACT_BASE_URL=http://mock-terminal:9000
      - KAFKA_ENABLED=false
    entrypoint: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    profiles:
      - dev
    networks:
      - integrations

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edifact-tests
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - EDIFACT_BASE_URL=http://localhost:9999
      - KAFKA_ENABLED=false
    entrypoint: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    profiles:
      - test
    networks:
      - integrations

networks:
  integrations:
    driver: bridge
