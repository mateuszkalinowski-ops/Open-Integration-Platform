# S3 Integrator — Account Configuration
#
# Define one or more S3 (or S3-compatible) account connections.
# Credentials should be provided via environment variables for production.
#
# Example — AWS S3:
#
# accounts:
#   - name: production-aws
#     aws_access_key_id: ${AWS_ACCESS_KEY_ID}
#     aws_secret_access_key: ${AWS_SECRET_ACCESS_KEY}
#     region: eu-central-1
#     default_bucket: my-data-bucket
#     environment: production
#
# Example — MinIO (S3-compatible):
#
#   - name: local-minio
#     aws_access_key_id: minioadmin
#     aws_secret_access_key: minioadmin
#     region: us-east-1
#     endpoint_url: http://minio:9000
#     use_path_style: true
#     default_bucket: test-bucket
#     environment: development
#
# Example — Wasabi:
#
#   - name: wasabi-storage
#     aws_access_key_id: ${WASABI_ACCESS_KEY}
#     aws_secret_access_key: ${WASABI_SECRET_KEY}
#     region: eu-central-1
#     endpoint_url: https://s3.eu-central-1.wasabisys.com
#     default_bucket: archive-bucket
#     environment: production

accounts: []
