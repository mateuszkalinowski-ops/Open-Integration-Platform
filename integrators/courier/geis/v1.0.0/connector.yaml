name: geis
category: courier
version: 1.0.0
display_name: "Geis"
description: "Central European logistics company — pallet and parcel shipments, domestic and international transport."
website_url: "https://www.geis-group.cz"
country: CZ
logo_url: /assets/logos/geis.svg
interface: courier
capabilities:
  - create_shipment
  - get_label
  - get_shipment_status
  - cancel_shipment
  - get_shipment
events:
  - shipment.status_changed
actions:
  - shipment.create
  - label.get
  - shipment.cancel
  - shipment.get
config_schema:
  required:
    - customer_code
    - password
  optional:
    - default_language
    - sandbox_mode
  field_types:
    sandbox_mode:
      type: boolean
      label: "Tryb sandbox"
      default: false
health_endpoint: /health
docs_url: /docs
