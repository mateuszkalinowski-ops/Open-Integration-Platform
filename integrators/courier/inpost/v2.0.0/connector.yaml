name: inpost
category: courier
version: 2.0.0
display_name: "InPost International 2024"
description: "International InPost shipments (API 2024) — point-to-point, address-to-point shipping, courier pickup orders, tracking, point search."
website_url: "https://inpost.pl"
country: PL
logo_url: /assets/logos/inpost.svg
interface: courier
capabilities:
  - create_shipment
  - get_label
  - get_shipment_status
  - cancel_shipment
  - get_pickup_points
  - create_pickup_order
  - get_pickup_cutoff_time
events:
  - shipment.status_changed
actions:
  - shipment.create
  - label.get
  - shipment.cancel
  - pickup_points.list
  - pickup_order.create
config_schema:
  required:
    - organization_id
    - access_token
  optional:
    - sandbox_mode
  field_types:
    sandbox_mode:
      type: boolean
      label: "Tryb sandbox"
      default: false
health_endpoint: /health
docs_url: /docs
