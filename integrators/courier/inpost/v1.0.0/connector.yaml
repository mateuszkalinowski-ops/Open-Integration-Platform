name: inpost
category: courier
version: 1.0.0
display_name: "InPost Krajowy"
description: "Domestic InPost courier service based on the ShipX API — Parcel Lockers, standard and express courier, labels, shipment tracking."
website_url: "https://inpost.pl"
country: PL
logo_url: /assets/logos/inpost.svg
interface: courier
capabilities:
  - create_shipment
  - get_label
  - get_shipment_status
  - cancel_shipment
  - get_pickup_points
events:
  - shipment.status_changed
actions:
  - shipment.create
  - label.get
  - shipment.cancel
  - pickup_points.list
config_schema:
  required:
    - organization_id
    - access_token
  optional:
    - sandbox_mode
  field_types:
    sandbox_mode:
      type: boolean
      label: "Tryb sandbox"
      default: false
health_endpoint: /health
docs_url: /docs
