name: dhl
category: courier
version: 1.4.0
display_name: DHL Parcel Poland
description: Domestic and international DHL Parcel courier shipments in Poland. Shipping, tracking, pickup points.
website_url: https://www.dhl.com/pl-pl
country: PL
logo_url: /assets/logos/dhl.svg
interface: courier
capabilities:
- create_shipment
- get_label
- get_shipment_status
- cancel_shipment
- get_pickup_points
- get_rates
events:
- shipment.status_changed
actions:
- shipment.create
- label.get
- shipment.cancel
- pickup_points.list
- rates.get
config_schema:
  required:
  - username
  - password
  optional:
  - account_number
  - sap_number
  - sandbox_mode
  field_types:
    sandbox_mode:
      type: boolean
      label: Tryb sandbox
      default: false
health_endpoint: /health
docs_url: /docs
api_version_check:
  current_api_version: 1.4.0
  check_url: https://developer.dhl.com/api-reference/parcel-de-shipping?language_content_entity=en
  check_type: html
  version_field: v\s*(\d+\.\d+\.\d+)
  docs_url: https://developer.dhl.com/api-reference/parcel-de-shipping
service_name: connector-dhl
action_routes:
  shipment.create:
    method: POST
    path: /shipments
  shipment.status:
    method: GET
    path: /shipments/{waybill_number}/status
  shipment.cancel:
    method: DELETE
    path: /shipments/{waybill_number}
  label.get:
    method: POST
    path: /labels
  points.list:
    method: GET
    path: /points
  rates.get:
    method: POST
    path: /rates
credential_validation:
  required_fields:
  - username
  - password
