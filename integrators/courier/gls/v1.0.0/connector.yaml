name: gls
category: courier
version: 1.0.0
display_name: "GLS"
description: "European courier network GLS — domestic and international parcels, ParcelShop pickup points."
website_url: "https://gls-group.com/PL"
country: NL
logo_url: /assets/logos/gls.svg
interface: courier
capabilities:
  - create_shipment
  - get_label
  - get_shipment_status
  - get_rates
events:
  - shipment.status_changed
actions:
  - shipment.create
  - label.get
  - rates.get
config_schema:
  required:
    - username
    - password
  optional:
    - sandbox_mode
  field_types:
    sandbox_mode:
      type: boolean
      label: "Tryb sandbox"
      default: false
health_endpoint: /health
docs_url: /docs
