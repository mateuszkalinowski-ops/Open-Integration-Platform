name: packeta
category: courier
version: 1.0.0
display_name: "Packeta (Zasilkovna)"
description: "Packeta/Zasilkovna pickup point network — affordable parcel delivery in Central and Eastern Europe."
website_url: "https://www.packeta.com"
country: CZ
logo_url: /assets/logos/packeta.png
interface: courier
capabilities:
  - create_shipment
  - get_label
  - get_shipment_status
  - cancel_shipment
events:
  - shipment.status_changed
actions:
  - shipment.create
  - label.get
  - shipment.cancel
config_schema:
  required:
    - api_password
  optional:
    - eshop
    - sandbox_mode
  field_types:
    sandbox_mode:
      type: boolean
      label: "Tryb sandbox"
      default: false
health_endpoint: /health
docs_url: /docs
