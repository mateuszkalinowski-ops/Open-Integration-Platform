name: dhl-express
category: courier
version: 3.2.0
display_name: "DHL Express"
description: "International express shipping by DHL Express — fast door-to-door delivery worldwide."
website_url: "https://www.dhl.com/pl-pl/home/express.html"
country: DE
logo_url: /assets/logos/dhl-express.svg
interface: courier
capabilities:
  - create_shipment
  - get_label
  - get_shipment_status
  - get_pickup_points
  - get_rates
events:
  - shipment.status_changed
actions:
  - shipment.create
  - label.get
  - pickup_points.list
  - rates.get
config_schema:
  required:
    - api_key
    - api_secret
  optional:
    - sandbox_mode
  field_types:
    sandbox_mode:
      type: boolean
      label: "Tryb sandbox"
      default: false
health_endpoint: /health
docs_url: /docs
api_version_check:
  current_api_version: "3.2.0"
  check_url: "https://developer.dhl.com/api-reference/dhl-express-mydhl-api?language_content_entity=en"
  check_type: html
  version_field: "v\\s*(\\d+\\.\\d+\\.\\d+)"
  docs_url: "https://developer.dhl.com/api-reference/dhl-express-mydhl-api"
