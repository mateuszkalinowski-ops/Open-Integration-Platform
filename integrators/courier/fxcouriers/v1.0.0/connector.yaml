name: fxcouriers
category: courier
version: 1.0.0
display_name: FX Couriers
description: FX Couriers (KurierSystem) integration — domestic and international shipments, order management, label printing,
  shipment pickup scheduling.
website_url: https://fxcouriers.kuriersystem.pl
country: PL
logo_url: /assets/logos/fxcouriers.svg
interface: courier
capabilities:
- create_shipment
- get_label
- get_shipment_status
- cancel_shipment
- get_tracking
- get_services
- create_pickup
- cancel_pickup
events:
- shipment.status_changed
- shipment.created
actions:
- shipment.create
- shipment.find_by_number
- shipment.get
- shipment.list
- label.get
- shipment.cancel
- shipment.status
- tracking.get
- services.list
- pickup.create
- pickup.get
- pickup.cancel
- company.get
