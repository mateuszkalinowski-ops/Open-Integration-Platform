config_schema:
  required:
  - api_token
  optional:
  - company_id
  field_types:
    api_token:
      type: string
      label: Token API (Bearer)
    company_id:
      type: integer
      label: ID firmy
health_endpoint: /health
docs_url: /docs
service_name: connector-fxcouriers
action_routes:
  shipment.create:
    method: POST
    path: /shipments
  shipment.status:
    method: GET
    path: /shipments/{order_id}/status
    header_from_payload:
    - api_token
  shipment.get:
    method: GET
    path: /shipments/{order_id}
    header_from_payload:
    - api_token
  shipment.find_by_number:
    method: GET
    path: /shipments/by-number/{order_number}
    header_from_payload:
    - api_token
  shipment.cancel:
    method: DELETE
    path: /shipments/{order_id}
    header_from_payload:
    - api_token
  shipment.list:
    method: GET
    path: /shipments
    header_from_payload:
    - api_token
    query_from_payload:
    - since
    - offset
    - company_id
  tracking.get:
    method: GET
    path: /tracking/{order_id}
    header_from_payload:
    - api_token
  label.get:
    method: POST
    path: /labels
  pickup.create:
    method: POST
    path: /pickups
  pickup.get:
    method: GET
    path: /pickups/{order_id}
    header_from_payload:
    - api_token
  pickup.cancel:
    method: DELETE
    path: /pickups/{order_id}
    header_from_payload:
    - api_token
  services.list:
    method: GET
    path: /services
    header_from_payload:
    - api_token
  company.get:
    method: GET
    path: /company/{company_id}
    header_from_payload:
    - api_token
credential_provisioning:
  mode: inject
  credential_mapping:
    api_token: api_token
    company_id:
      source: company_id
      optional: true
credential_validation:
  required_fields:
  - api_token
