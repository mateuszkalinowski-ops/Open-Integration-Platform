config_schema:
  required:
  - store_url
  - consumer_key
  - consumer_secret
  optional:
  - api_version
  - verify_ssl
  field_types:
    api_version:
      type: string
      label: API Version
      default: wc/v3
    verify_ssl:
      type: boolean
      label: Verify SSL
      default: true
health_endpoint: /health
docs_url: /docs
api_version_check:
  current_api_version: 3.0.0
  check_url: https://woocommerce.github.io/woocommerce-rest-api-docs/
  check_type: html
  version_field: wc/(v\d+)
  docs_url: https://woocommerce.github.io/woocommerce-rest-api-docs/
service_name: connector-woocommerce
action_routes:
  order.fetch:
    method: GET
    path: /orders
    query_from_payload:
    - account_name
    - since
    - page
    - per_page
  order.get:
    method: GET
    path: /orders/{order_id}
    query_from_payload:
    - account_name
  order.status_update:
    method: PUT
    path: /orders/{order_id}/status
    query_from_payload:
    - account_name
  order.invoice_upload:
    method: POST
    path: /orders/{order_id}/invoice
    query_from_payload:
    - account_name
  stock.sync:
    method: POST
    path: /stock/sync
    query_from_payload:
    - account_name
  product.get:
    method: GET
    path: /products/{product_id}
    query_from_payload:
    - account_name
  product.search:
    method: GET
    path: /products/search
    query_from_payload:
    - account_name
    - query
    - page
    - page_size
  products.sync:
    method: POST
    path: /products/sync
    query_from_payload:
    - account_name
credential_validation:
  required_fields:
  - store_url
  - consumer_key
  - consumer_secret
  test_request:
    method: GET
    url_template: '{store_url}/wp-json/{api_version}/system_status'
    auth: basic
    auth_fields:
    - consumer_key
    - consumer_secret
    success_status: 200
    defaults:
      api_version: wc/v3
