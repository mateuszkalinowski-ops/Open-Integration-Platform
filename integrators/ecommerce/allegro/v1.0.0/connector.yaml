config_schema:
  required:
  - client_id
  - client_secret
  optional:
  - sandbox_mode
  - api_url
  - auth_url
  field_types:
    sandbox_mode:
      type: boolean
      label: Tryb sandbox
      default: false
oauth2:
  authorization_url: "https://allegro.pl/auth/oauth/authorize"
  token_url: "https://allegro.pl/auth/oauth/token"
  scopes:
    - "allegro:api:orders:read"
    - "allegro:api:orders:write"
    - "allegro:api:offers:read"
    - "allegro:api:offers:write"
    - "allegro:api:profile:read"
    - "allegro:api:sale:offers:read"
    - "allegro:api:sale:offers:write"
  pkce: true
  refresh_before_expiry_seconds: 300
  sandbox:
    authorization_url: "https://allegro.pl.allegrosandbox.pl/auth/oauth/authorize"
    token_url: "https://allegro.pl.allegrosandbox.pl/auth/oauth/token"
rate_limits:
  global: 9000/min
  per_action:
    order.fetch: 300/min
    order.get: 600/min
    shipment.create: 120/min
health_endpoint: /health
docs_url: /docs
api_version_check:
  current_api_version: '2025'
  check_url: https://developer.allegro.pl/documentation
  check_type: html
  version_field: api\s+version[:\s]+(\d+\.?\d*)
  docs_url: https://developer.allegro.pl/documentation
service_name: connector-allegro
credential_provisioning:
  mode: account
  account_endpoint: /accounts
  payload_field: account_name
  credential_mapping:
    name: account_name
    client_id: client_id
    client_secret: client_secret
    api_url:
      source: api_url
      default: "https://api.allegro.pl"
    auth_url:
      source: auth_url
      default: "https://allegro.pl/auth/oauth"
