name: allegro
category: ecommerce
version: 1.0.0
display_name: "Allegro"
description: "Poland's largest e-commerce platform. Order sync, stock level management and offer listings."
website_url: "https://allegro.pl"
country: PL
logo_url: /assets/logos/allegro.svg
interface: ecommerce
capabilities:
  - fetch_orders
  - get_order
  - update_order_status
  - sync_stock
  - get_product
  - search_products
  - upload_invoice
events:
  - order.created
  - order.status_changed
  - stock.updated
actions:
  - order.fetch
  - order.get
  - order.status_update
  - order.invoice_upload
  - order.invoices_get
  - stock.sync
  - product.get
  - product.search
event_fields:
  order.created:
    - field: order_id
      label: "ID zamowienia"
      type: string
    - field: buyer.login
      label: "Login kupujacego"
      type: string
    - field: buyer.email
      label: "Email kupujacego"
      type: string
    - field: buyer.first_name
      label: "Imie kupujacego"
      type: string
    - field: buyer.last_name
      label: "Nazwisko kupujacego"
      type: string
    - field: buyer.phone
      label: "Telefon kupujacego"
      type: string
    - field: delivery.address.street
      label: "Ulica dostawy"
      type: string
    - field: delivery.address.city
      label: "Miasto dostawy"
      type: string
    - field: delivery.address.zip_code
      label: "Kod pocztowy dostawy"
      type: string
    - field: delivery.address.country
      label: "Kraj dostawy"
      type: string
    - field: delivery.method
      label: "Metoda dostawy"
      type: string
    - field: delivery.point_id
      label: "ID punktu odbioru"
      type: string
    - field: payment.amount
      label: "Kwota zamowienia"
      type: number
    - field: payment.currency
      label: "Waluta"
      type: string
    - field: items
      label: "Produkty (lista)"
      type: "object[]"
    - field: note
      label: "Uwagi kupujacego"
      type: string
    - field: created_at
      label: "Data utworzenia"
      type: datetime
  order.status_changed:
    - field: order_id
      label: "ID zamowienia"
      type: string
    - field: status
      label: "Nowy status"
      type: string
    - field: previous_status
      label: "Poprzedni status"
      type: string
    - field: updated_at
      label: "Data zmiany"
      type: datetime
  stock.updated:
    - field: product_id
      label: "ID produktu"
      type: string
    - field: offer_id
      label: "ID oferty"
      type: string
    - field: quantity
      label: "Ilosc"
      type: integer
    - field: updated_at
      label: "Data aktualizacji"
      type: datetime

action_fields:
  order.fetch:
    - field: status
      label: "Filtruj po statusie"
      type: string
    - field: limit
      label: "Limit wynikow"
      type: integer
    - field: offset
      label: "Offset"
      type: integer
  order.get:
    - field: order_id
      label: "ID zamowienia"
      type: string
      required: true
  order.status_update:
    - field: order_id
      label: "ID zamowienia"
      type: string
      required: true
    - field: status
      label: "Nowy status"
      type: string
      required: true
    - field: tracking_number
      label: "Numer sledzenia"
      type: string
    - field: carrier
      label: "Przewoznik"
      type: string
  stock.sync:
    - field: offer_id
      label: "ID oferty"
      type: string
      required: true
    - field: quantity
      label: "Nowa ilosc"
      type: integer
      required: true
  order.invoice_upload:
    - field: order_id
      label: "ID zamowienia (checkout form)"
      type: string
      required: true
    - field: invoice_base64
      label: "Faktura PDF (base64)"
      type: string
      required: true
    - field: invoice_number
      label: "Numer faktury (np. FV 01/2026)"
      type: string
      required: true
    - field: filename
      label: "Nazwa pliku"
      type: string
  order.invoices_get:
    - field: order_id
      label: "ID zamowienia (checkout form)"
      type: string
      required: true
  product.get:
    - field: product_id
      label: "ID produktu"
      type: string
      required: true

config_schema:
  required:
    - client_id
    - client_secret
  optional:
    - sandbox_mode
    - api_url
    - auth_url
  field_types:
    sandbox_mode:
      type: boolean
      label: "Tryb sandbox"
      default: false
health_endpoint: /health
docs_url: /docs
