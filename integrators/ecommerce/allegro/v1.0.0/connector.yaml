credential_validation:
  required_fields:
  - client_id
  - client_secret
  test_request:
    method: POST
    url_template: '{auth_url}/token'
    auth: basic
    auth_fields:
    - client_id
    - client_secret
    headers_template:
      Content-Type: application/x-www-form-urlencoded
    form_data_template:
      grant_type: client_credentials
    success_status: 200
    defaults:
      auth_url: https://allegro.pl/auth/oauth
