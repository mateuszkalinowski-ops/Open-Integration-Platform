name: dead-letter-queue
description: |
  Global error handler for TOS EDI workflows. Persists failed messages to
  OIP audit trail with full context, sends Slack and email notifications
  with error details. Invoked by error_handler blocks of all other workflows.

inputs:
  source_workflow:
    type: string
    required: true
    description: "Name of the workflow that failed"
  error:
    type: object
    required: true
    description: "Error object with message, stack, code"
  context:
    type: object
    required: false
    description: "Additional context from the failed workflow"

nodes:

  - id: persist-to-audit
    type: connector.action
    connector: oip-internal
    action: audit.log
    input:
      event_type: DLQ_MESSAGE
      severity: error
      source_workflow: "{{ inputs.source_workflow }}"
      error_message: "{{ inputs.error.message | default(inputs.error | tojson) }}"
      error_code: "{{ inputs.error.code | default('UNKNOWN') }}"
      error_stack: "{{ inputs.error.stack | default('') }}"
      context: "{{ inputs.context | default({}) }}"
      timestamp: "{{ now() | strftime('%Y-%m-%dT%H:%M:%S.%fZ') }}"

  - id: send-slack-alert
    type: connector.action
    connector: oip-internal
    action: notification.send
    input:
      channels: [slack]
      severity: error
      title: "EDI Workflow Failed: {{ inputs.source_workflow }}"
      message: |
        Workflow `{{ inputs.source_workflow }}` failed.

        **Error:** {{ inputs.error.message | default(inputs.error | tojson) }}
        **Code:** {{ inputs.error.code | default('UNKNOWN') }}
        **Context:** {{ inputs.context | default({}) | tojson }}

        Check OIP Dashboard → Audit Trail for details.

  - id: send-email-alert
    type: connector.action
    connector: oip-internal
    action: notification.send
    input:
      channels: [email]
      severity: error
      title: "EDI Workflow Failed: {{ inputs.source_workflow }}"
      message: |
        Workflow {{ inputs.source_workflow }} encountered an error and the
        message has been placed in the dead letter queue.

        Error: {{ inputs.error.message | default(inputs.error | tojson) }}
        Code: {{ inputs.error.code | default('UNKNOWN') }}
        Context: {{ inputs.context | default({}) | tojson }}
        Time: {{ now() | strftime('%Y-%m-%d %H:%M:%S UTC') }}

        Please review the failed message in the OIP Dashboard → Dead Letter Queue.

  - id: increment-dlq-metric
    type: metrics.emit
    metrics:
      - name: edi_dlq_messages_total
        value: 1
        type: counter
        labels:
          source_workflow: "{{ inputs.source_workflow }}"
          error_code: "{{ inputs.error.code | default('UNKNOWN') }}"

  - id: log-dlq
    type: log
    level: error
    message: >
      DLQ: {{ inputs.source_workflow }} failed —
      {{ inputs.error.message | default('unknown error') }}
