name: reconciliation-daily
description: |
  Scheduled daily at 02:00 UTC. Generates a count report of inbound vs
  outbound EDI messages per partner per message type for the previous day.
  Compares OIP audit trail counts with partner SFTP file counts to detect
  discrepancies. Results are logged to OIP and optionally sent via email.
  Partner-agnostic — iterates all enabled partners from partner_registry.

trigger:
  type: schedule
  cron: "0 2 * * *"

nodes:

  - id: compute-date-range
    type: expression
    expression: |
      {% set yesterday = now() - timedelta(days=1) %}
      {"date_from": "{{ yesterday | strftime('%Y-%m-%dT00:00:00Z') }}",
       "date_to": "{{ yesterday | strftime('%Y-%m-%dT23:59:59Z') }}",
       "report_date": "{{ yesterday | strftime('%Y-%m-%d') }}"}
    output: dates

  - id: list-partners
    type: connector.action
    connector: oip-internal
    action: partner_registry.list_enabled
    input: {}

  - id: collect-stats
    type: foreach
    items: "{{ nodes.list-partners.output.partners }}"
    parallel: true
    body:

      - id: count-inbound
        type: connector.action
        connector: oip-internal
        action: audit.count
        input:
          event_types:
            - COPRAR_PARSED
            - COPARN_PARSED
            - COHAOR_PARSED
            - IFTMIN_PARSED
            - APERAK_RECEIVED
          partner_code: "{{ item.partner_code }}"
          date_from: "{{ nodes.compute-date-range.output.dates.date_from }}"
          date_to: "{{ nodes.compute-date-range.output.dates.date_to }}"

      - id: count-outbound
        type: connector.action
        connector: oip-internal
        action: audit.count
        input:
          event_types:
            - CODECO_SENT
            - COARRI_SENT
            - IFTSTA_SENT
            - APERAK_SENT
            - CONTRL_SENT
          partner_code: "{{ item.partner_code }}"
          date_from: "{{ nodes.compute-date-range.output.dates.date_from }}"
          date_to: "{{ nodes.compute-date-range.output.dates.date_to }}"

      - id: count-ftp-files
        type: connector.action
        connector: ftp-sftp
        account: "{{ item.ftp_account }}"
        action: file.list
        input:
          path: "/archive/"
          pattern: "*_{{ nodes.compute-date-range.output.dates.report_date | replace('-', '') }}*"

      - id: build-partner-report
        type: expression
        expression: |
          {"partner_code": "{{ item.partner_code }}",
           "inbound_count": {{ nodes.count-inbound.output.count | default(0) }},
           "outbound_count": {{ nodes.count-outbound.output.count | default(0) }},
           "ftp_file_count": {{ nodes.count-ftp-files.output.files | length | default(0) }},
           "inbound_breakdown": {{ nodes.count-inbound.output.breakdown | default({}) | tojson }},
           "outbound_breakdown": {{ nodes.count-outbound.output.breakdown | default({}) | tojson }}}
        output: partner_stats

  - id: aggregate-report
    type: expression
    expression: |
      {% set stats = nodes.collect-stats.output | map(attribute='partner_stats') | list %}
      {% set total_in = stats | sum(attribute='inbound_count') %}
      {% set total_out = stats | sum(attribute='outbound_count') %}
      {"report_date": "{{ nodes.compute-date-range.output.dates.report_date }}",
       "total_inbound": {{ total_in }},
       "total_outbound": {{ total_out }},
       "partners": {{ stats | tojson }}}
    output: report

  - id: persist-report
    type: connector.action
    connector: oip-internal
    action: audit.log
    input:
      event_type: DAILY_RECONCILIATION
      severity: info
      report: "{{ nodes.aggregate-report.output.report }}"

  - id: check-discrepancies
    type: foreach
    items: "{{ nodes.aggregate-report.output.report.partners }}"
    parallel: false
    body:
      - id: check-mismatch
        type: condition
        if: >
          {{ item.inbound_count + item.outbound_count > 0
             and (item.inbound_count + item.outbound_count) != item.ftp_file_count }}
        then:
          - id: alert-discrepancy
            type: connector.action
            connector: oip-internal
            action: notification.send
            input:
              channels: [slack]
              severity: warning
              title: "EDI Reconciliation Mismatch: {{ item.partner_code }}"
              message: >
                Date: {{ nodes.compute-date-range.output.dates.report_date }}.
                Partner: {{ item.partner_code }}.
                OIP counts: IN={{ item.inbound_count }}, OUT={{ item.outbound_count }}.
                FTP archive files: {{ item.ftp_file_count }}.
                Please investigate.

  - id: send-daily-summary
    type: connector.action
    connector: oip-internal
    action: notification.send
    input:
      channels: [email]
      severity: info
      title: "EDI Daily Reconciliation — {{ nodes.compute-date-range.output.dates.report_date }}"
      message: |
        EDI Gateway Daily Report for {{ nodes.compute-date-range.output.dates.report_date }}

        Total Inbound: {{ nodes.aggregate-report.output.report.total_inbound }}
        Total Outbound: {{ nodes.aggregate-report.output.report.total_outbound }}

        Per-partner breakdown:
        {% for p in nodes.aggregate-report.output.report.partners %}
        - {{ p.partner_code }}: IN={{ p.inbound_count }}, OUT={{ p.outbound_count }}, FTP={{ p.ftp_file_count }}
        {% endfor %}

  - id: emit-metrics
    type: metrics.emit
    metrics:
      - name: edi_reconciliation_inbound_total
        value: "{{ nodes.aggregate-report.output.report.total_inbound }}"
        type: gauge
      - name: edi_reconciliation_outbound_total
        value: "{{ nodes.aggregate-report.output.report.total_outbound }}"
        type: gauge

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: reconciliation-daily
    error: "{{ error }}"
    context:
      report_date: "{{ nodes.compute-date-range.output.dates.report_date | default('unknown') }}"
