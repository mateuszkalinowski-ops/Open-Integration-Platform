name: coparn-inbound-rest-edi
description: |
  COPARN via REST+EDIFACT. Zewnętrzna firma wysyła wiadomość EDIFACT COPARN
  jako string w JSON payload przez HTTP POST. OIP parsuje EDIFACT, tworzy AWD
  (awizację drogową) w TOS, dodaje kontenery i zwraca APERAK/CONTRL
  w odpowiedzi HTTP.

trigger:
  type: http
  method: POST
  auth: api_key

nodes:

  - id: validate-input
    type: expression
    output: validated
    expression: |
      {% if not trigger_data.edifact_content %}
        {{ raise("edifact_content is required — raw EDIFACT string") }}
      {% endif %}
      {% if not trigger_data.partner_code %}
        {{ raise("partner_code is required (e.g. METRANS, HHLA)") }}
      {% endif %}
      {{ trigger_data | tojson }}

  - id: resolve-edifact-account
    type: connector.action
    connector: oip-internal
    action: partner_registry.resolve_by_code
    input:
      partner_code: "{{ trigger_data.partner_code }}"

  - id: parse-coparn
    type: connector.action
    connector: edifact
    account: "{{ nodes.resolve-edifact-account.output.edifact_account }}"
    action: coparn.parse
    input:
      content: "{{ trigger_data.edifact_content }}"
    on_error:
      - type: expression
        output: contrl_nack
        expression: |
          {{ edifact.build_contrl(
               raw_content=trigger_data.edifact_content,
               syntax_status="error",
               error=error
             ) }}

  - id: build-contrl-ack
    type: connector.action
    connector: edifact
    account: "{{ nodes.resolve-edifact-account.output.edifact_account }}"
    action: contrl.build
    input:
      raw_content: "{{ trigger_data.edifact_content }}"
      syntax_status: ok

  - id: build-aperak-ack
    type: connector.action
    connector: edifact
    account: "{{ nodes.resolve-edifact-account.output.edifact_account }}"
    action: aperak.build
    input:
      parsed_message: "{{ nodes.parse-coparn.output }}"
      response_type: accepted

  - id: create-awd
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: awd.create
      body:
        direction: "{{ nodes.parse-coparn.output.payload.function_code }}"
        booking_ref: "{{ nodes.parse-coparn.output.payload.booking_ref }}"
        truck_plate: "{{ nodes.parse-coparn.output.payload.truck_plate }}"
        driver_name: "{{ nodes.parse-coparn.output.payload.driver_name }}"
        carrier_code: "{{ nodes.parse-coparn.output.payload.carrier.id }}"
        haulier_code: "{{ nodes.parse-coparn.output.payload.haulier.id | default('') }}"
        pickup_window_from: "{{ nodes.parse-coparn.output.payload.pickup_window_from }}"
        pickup_window_to: "{{ nodes.parse-coparn.output.payload.pickup_window_to }}"
        TOS_DOC_POL: "{{ nodes.parse-coparn.output.payload.pol.un_locode }}"
        TOS_DOC_POD: "{{ nodes.parse-coparn.output.payload.pod.un_locode }}"
        document_id: "{{ nodes.parse-coparn.output.payload.document_id }}"
        function_code: "{{ nodes.parse-coparn.output.payload.function_code }}"
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: add-containers
    type: foreach
    items: "{{ nodes.parse-coparn.output.payload.containers }}"
    parallel: false
    body:
      - id: add-container
        type: connector.action
        connector: rest-api
        account: clip-malaszewicze
        action: rest.call
        input:
          account: clip-malaszewicze
          named_action: train.add_container
          body:
            doc_id: "{{ nodes.create-awd.output.data.doc_id }}"
            container_no: "{{ item.container_no }}"
            iso_size_type: "{{ item.iso_size_type }}"
            weight_kg: "{{ item.weight_kg }}"
            is_empty: "{{ item.is_empty }}"
            seal_no: "{{ item.seal_no }}"
            dangerous_goods: "{{ item.dangerous_goods }}"
        retry:
          max_attempts: 2
          backoff_s: [1, 3]

  - id: return-response
    type: expression
    output: response
    expression: |
      {
        "status": "accepted",
        "awd_id": "{{ nodes.create-awd.output.data.doc_id }}",
        "containers_count": {{ nodes.parse-coparn.output.payload.containers | length }},
        "contrl": "{{ nodes.build-contrl-ack.output.edifact_content }}",
        "aperak": "{{ nodes.build-aperak-ack.output.edifact_content }}"
      }

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: coparn-inbound-rest-edi
    error: "{{ error }}"
    context:
      partner_code: "{{ trigger_data.partner_code | default('unknown') }}"
