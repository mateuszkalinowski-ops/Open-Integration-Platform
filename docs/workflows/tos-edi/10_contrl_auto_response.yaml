name: contrl-auto-response
description: |
  Helper subworkflow. Builds and sends CONTRL syntax acknowledgement for
  every valid inbound EDIFACT message. CONTRL confirms only syntax-level
  correctness (UNH/UNT matching, mandatory segments present) — not business
  logic (that's APERAK's job). Must be sent within seconds of receiving
  the inbound file. Partner-agnostic.

inputs:
  raw_content:
    type: string
    required: true
    description: "Raw EDIFACT content that was received"
  edifact_account:
    type: string
    required: true
    description: "EDIFACT account name for building the response"
  ftp_account:
    type: string
    required: true
    description: "FTP account for uploading the CONTRL"
  syntax_status:
    type: string
    required: true
    enum: [ok, error]
    description: "Syntax validation result"
  error:
    type: object
    required: false
    description: "Error details if syntax_status is error"

nodes:

  - id: extract-envelope
    type: expression
    expression: |
      {% set lines = inputs.raw_content.split("'") %}
      {% set unb = lines | select('match', '^UNB\\+') | first | default('') %}
      {% set unh = lines | select('match', '^UNH\\+') | first | default('') %}
      {% set interchange_ref = unb.split('+')[5] if unb else 'UNKNOWN' %}
      {% set message_ref = unh.split('+')[1] if unh else 'UNKNOWN' %}
      {% set sender = unb.split('+')[2].split(':')[0] if unb else 'UNKNOWN' %}
      {% set receiver = unb.split('+')[3].split(':')[0] if unb else 'UNKNOWN' %}
      {"interchange_ref": "{{ interchange_ref }}",
       "message_ref": "{{ message_ref }}",
       "sender": "{{ sender }}",
       "receiver": "{{ receiver }}"}
    output: envelope

  - id: build-contrl
    type: connector.action
    connector: edifact
    account: "{{ inputs.edifact_account }}"
    action: contrl.build
    input:
      msg_type: CONTRL
      syntax_status: "{{ inputs.syntax_status }}"
      referenced_interchange_ref: "{{ nodes.extract-envelope.output.envelope.interchange_ref }}"
      referenced_message_ref: "{{ nodes.extract-envelope.output.envelope.message_ref }}"
      error_details: "{{ inputs.error | default({}) }}"

  - id: upload-contrl
    type: connector.action
    connector: ftp-sftp
    account: "{{ inputs.ftp_account }}"
    action: file.upload
    input:
      path: "/outbound/CONTRL_{{ nodes.extract-envelope.output.envelope.interchange_ref }}_{{ now() | strftime('%Y%m%d%H%M%S') }}.edi"
      content: "{{ nodes.build-contrl.output.content }}"

  - id: log-sent
    type: log
    level: info
    message: >
      CONTRL {{ inputs.syntax_status }} sent for interchange
      {{ nodes.extract-envelope.output.envelope.interchange_ref }}
      via {{ inputs.ftp_account }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: contrl-auto-response
    error: "{{ error }}"
    context:
      edifact_account: "{{ inputs.edifact_account }}"
      syntax_status: "{{ inputs.syntax_status }}"
