name: aperak-auto-response
description: |
  Helper subworkflow. Builds and sends APERAK accepted/rejected response
  after successful inbound parsing or after TOS event processing.
  Can be invoked from inbound workflows (01-07) or from the polling hub (00).
  When invoked from the polling hub, resolves partner from the TOS event;
  when invoked from inbound workflows, receives partner info directly.
  Partner-agnostic.

inputs:
  event:
    type: object
    required: false
    description: "TOS audit_log event (when invoked from polling hub)"
  parsed_message:
    type: object
    required: false
    description: "Parsed EDIFACT message (when invoked from inbound workflow)"
  edifact_account:
    type: string
    required: false
    description: "EDIFACT account name (when invoked from inbound workflow)"
  ftp_account:
    type: string
    required: false
    description: "FTP account name (when invoked from inbound workflow)"
  response_type:
    type: string
    required: true
    enum: [accepted, rejected, accepted_with_errors]
    description: "APERAK response type"
  errors:
    type: array
    required: false
    description: "List of APERAK errors (for rejected/accepted_with_errors)"

nodes:

  - id: resolve-context
    type: condition
    if: "{{ inputs.event is defined and inputs.event }}"
    then:
      - id: enrich-doc
        type: connector.action
        connector: rest-api
        account: clip-malaszewicze
        action: rest.call
        input:
          account: clip-malaszewicze
          named_action: doc.get_status
          body:
            doc_id: "{{ inputs.event.doc_id }}"
      - id: resolve-partners-from-event
        type: connector.action
        connector: oip-internal
        action: partner_registry.resolve_by_codes
        input:
          partner_codes: "{{ nodes.enrich-doc.output.data.edi_partner_codes | split(',') }}"
    else:
      - id: resolve-single-partner
        type: expression
        expression: >
          [{"edifact_account": "{{ inputs.edifact_account }}",
            "ftp_account": "{{ inputs.ftp_account }}",
            "partner_code": "inbound-sender"}]
        output: partners

  - id: get-partners
    type: expression
    expression: >
      {{ nodes.resolve-partners-from-event.output.partners
         if nodes.resolve-partners-from-event is defined
         else nodes.resolve-single-partner.output.partners }}
    output: partner_list

  - id: fanout-partners
    type: foreach
    items: "{{ nodes.get-partners.output.partner_list }}"
    parallel: true
    body:

      - id: build-aperak
        type: connector.action
        connector: edifact
        account: "{{ item.edifact_account }}"
        action: aperak.build
        input:
          msg_type: APERAK
          response_type: "{{ inputs.response_type }}"
          referenced_message_ref: >
            {{ inputs.parsed_message.message_ref
               if inputs.parsed_message is defined
               else inputs.event.doc_symbol ~ '-' ~ inputs.event.id }}
          referenced_interchange_ref: >
            {{ inputs.parsed_message.interchange_ref
               if inputs.parsed_message is defined
               else '' }}
          errors: "{{ inputs.errors | default([]) }}"

      - id: upload-aperak
        type: connector.action
        connector: ftp-sftp
        account: "{{ item.ftp_account }}"
        action: file.upload
        input:
          path: "/outbound/{{ item.partner_code }}/APERAK_{{ inputs.response_type }}_{{ now() | strftime('%Y%m%d%H%M%S') }}.edi"
          content: "{{ nodes.build-aperak.output.content }}"

      - id: log-sent
        type: log
        level: info
        message: >
          APERAK {{ inputs.response_type }} sent to {{ item.partner_code }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: aperak-auto-response
    error: "{{ error }}"
    context:
      response_type: "{{ inputs.response_type }}"
