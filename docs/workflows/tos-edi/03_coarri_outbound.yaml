name: coarri-outbound
description: |
  Outbound COARRI subworkflow. Invoked by 00_tos_poll_events for
  PRZELAD_ZAKONCZONY events (crane operation completed). Enriches document
  data from TOS, resolves EDI partners, builds COARRI per partner with
  container discharge/loading report, and uploads to each partner's SFTP.
  Partner-agnostic.

inputs:
  event:
    type: object
    required: true
    description: "TOS audit_log event object (PRZELAD_ZAKONCZONY)"

nodes:

  - id: enrich-doc
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: doc.get_status
      body:
        doc_id: "{{ inputs.event.doc_id }}"
    timeout_s: 15

  - id: resolve-partners
    type: connector.action
    connector: oip-internal
    action: partner_registry.resolve_by_codes
    input:
      partner_codes: "{{ nodes.enrich-doc.output.data.edi_partner_codes | split(',') }}"

  - id: skip-if-no-partners
    type: condition
    if: "{{ nodes.resolve-partners.output.partners | length == 0 }}"
    then:
      - id: log-no-partner
        type: log
        level: warn
        message: "No EDI partners for doc {{ inputs.event.doc_id }} — skipping COARRI"
      - id: end-no-partner
        type: end

  - id: determine-operation-type
    type: expression
    expression: >
      {{ 'loading' if inputs.event.details.operation == 'ZALADOWANIE'
         else 'discharge' }}
    output: operation_type

  - id: fanout-partners
    type: foreach
    items: "{{ nodes.resolve-partners.output.partners }}"
    parallel: true
    body:

      - id: build-coarri
        type: connector.action
        connector: edifact
        account: "{{ item.edifact_account }}"
        action: coarri.build
        input:
          msg_type: COARRI
          version: "{{ item.edifact_version }}"
          operation_type: "{{ nodes.determine-operation-type.output.operation_type }}"
          document_id: "{{ inputs.event.doc_symbol }}-{{ inputs.event.id }}"
          completion_time: "{{ inputs.event.created_at }}"
          doc_data: "{{ nodes.enrich-doc.output.data }}"
          containers: "{{ nodes.enrich-doc.output.data.containers }}"

      - id: upload-coarri
        type: connector.action
        connector: ftp-sftp
        account: "{{ item.ftp_account }}"
        action: file.upload
        input:
          path: "/outbound/{{ item.partner_code }}/COARRI_{{ inputs.event.doc_symbol }}_{{ inputs.event.id }}.edi"
          content: "{{ nodes.build-coarri.output.content }}"

      - id: log-sent
        type: log
        level: info
        message: >
          COARRI {{ nodes.determine-operation-type.output.operation_type }} sent to
          {{ item.partner_code }} for doc {{ inputs.event.doc_symbol }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: coarri-outbound
    error: "{{ error }}"
    context:
      event_id: "{{ inputs.event.id }}"
      doc_symbol: "{{ inputs.event.doc_symbol }}"
