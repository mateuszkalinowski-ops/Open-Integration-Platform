name: codeco-outbound
description: |
  Outbound CODECO subworkflow. Invoked by 00_tos_poll_events for WJAZD/WYJAZD_TIR
  events (gate-in/gate-out) and optionally PRZESUNIECIE_WYKONANE (yard-move).
  Enriches document data from TOS, resolves EDI partners, builds CODECO per
  partner, and uploads to each partner's SFTP. Partner-agnostic.

inputs:
  event:
    type: object
    required: true
    description: "TOS audit_log event object"
  direction:
    type: string
    required: true
    enum: [gate-in, gate-out, yard-move]
    description: "CODECO direction type"

nodes:

  - id: enrich-doc
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: doc.get_status
      body:
        doc_id: "{{ inputs.event.doc_id }}"
    timeout_s: 15

  - id: resolve-partners
    type: connector.action
    connector: oip-internal
    action: partner_registry.resolve_by_codes
    input:
      partner_codes: "{{ nodes.enrich-doc.output.data.edi_partner_codes | split(',') }}"

  - id: skip-if-no-partners
    type: condition
    if: "{{ nodes.resolve-partners.output.partners | length == 0 }}"
    then:
      - id: log-no-partner
        type: log
        level: warn
        message: "No EDI partners for doc {{ inputs.event.doc_id }} — skipping CODECO"
      - id: end-no-partner
        type: end

  - id: fanout-partners
    type: foreach
    items: "{{ nodes.resolve-partners.output.partners }}"
    parallel: true
    body:

      - id: check-yard-move-capability
        type: condition
        if: "{{ inputs.direction == 'yard-move' and not item.capabilities.supports_yard_move }}"
        then:
          - type: log
            level: debug
            message: "Partner {{ item.partner_code }} does not support yard-move — skipping"
          - type: continue

      - id: build-codeco
        type: connector.action
        connector: edifact
        account: "{{ item.edifact_account }}"
        action: codeco.build
        input:
          msg_type: CODECO
          version: "{{ item.edifact_version }}"
          direction: "{{ inputs.direction }}"
          document_id: "{{ inputs.event.doc_symbol }}-{{ inputs.event.id }}"
          event_time: "{{ inputs.event.created_at }}"
          doc_data: "{{ nodes.enrich-doc.output.data }}"
          containers: "{{ nodes.enrich-doc.output.data.containers }}"

      - id: upload-codeco
        type: connector.action
        connector: ftp-sftp
        account: "{{ item.ftp_account }}"
        action: file.upload
        input:
          path: "/outbound/{{ item.partner_code }}/CODECO_{{ inputs.event.doc_symbol }}_{{ inputs.event.id }}.edi"
          content: "{{ nodes.build-codeco.output.content }}"

      - id: log-sent
        type: log
        level: info
        message: >
          CODECO {{ inputs.direction }} sent to {{ item.partner_code }}
          for doc {{ inputs.event.doc_symbol }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: codeco-outbound
    error: "{{ error }}"
    context:
      event_id: "{{ inputs.event.id }}"
      direction: "{{ inputs.direction }}"
