name: train-notification-rest
description: |
  Awizacja pociągu przez REST API. Zewnętrzna firma (operator kolejowy)
  wysyła JSON POST-em na /api/v1/workflows/{id}/execute z danymi składu
  pociągu (numer, ETA, wagony, kontenery). OIP waliduje payload,
  tworzy AWK w Pinquark TOS, dodaje wagony i kontenery, zatwierdza AWK
  i zwraca potwierdzenie z numerem dokumentu.

trigger:
  type: http
  method: POST
  auth: api_key

nodes:

  - id: validate-input
    type: expression
    output: validated
    expression: |
      {% if not trigger_data.train_no %}
        {{ raise("train_no is required") }}
      {% endif %}
      {% if not trigger_data.eta %}
        {{ raise("eta is required (ISO 8601)") }}
      {% endif %}
      {% if not trigger_data.wagons or trigger_data.wagons | length == 0 %}
        {{ raise("wagons array is required and must not be empty") }}
      {% endif %}
      {{ trigger_data | tojson }}

  - id: create-awk
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: awk.create
      body:
        tos_train_no: "{{ trigger_data.train_no }}"
        tos_doc_planned_arrival: "{{ trigger_data.eta }}"
        carrier_code: "{{ trigger_data.carrier_code | default('') }}"
        TOS_DOC_POL: "{{ trigger_data.pol | default('') }}"
        TOS_DOC_POD: "{{ trigger_data.pod | default('PLMAL') }}"
        function_code: "{{ trigger_data.function_code | default('9') }}"
        document_id: "{{ trigger_data.document_id | default('') }}"
        note: "{{ trigger_data.note | default('REST API notification') }}"
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: add-wagons
    type: foreach
    items: "{{ trigger_data.wagons }}"
    parallel: false
    body:
      - id: add-wagon
        type: connector.action
        connector: rest-api
        account: clip-malaszewicze
        action: rest.call
        input:
          account: clip-malaszewicze
          named_action: train.add_wagon
          body:
            doc_id: "{{ nodes.create-awk.output.data.doc_id }}"
            wagon_no: "{{ item.wagon_no }}"
            wagon_type: "{{ item.wagon_type | default('Sgns') }}"
            sequence_no: "{{ item.sequence_no }}"
            tare_kg: "{{ item.tare_kg | default(0) }}"
        retry:
          max_attempts: 2
          backoff_s: [1, 3]

  - id: add-containers
    type: foreach
    items: "{{ trigger_data.wagons }}"
    parallel: false
    body:
      - id: add-containers-per-wagon
        type: foreach
        items: "{{ item.containers | default([]) }}"
        parallel: false
        body:
          - id: add-container
            type: connector.action
            connector: rest-api
            account: clip-malaszewicze
            action: rest.call
            input:
              account: clip-malaszewicze
              named_action: train.add_container
              body:
                doc_id: "{{ nodes.create-awk.output.data.doc_id }}"
                wagon_no: "{{ item.wagon_no }}"
                container_no: "{{ item.container_no }}"
                iso_size_type: "{{ item.iso_size_type | default('') }}"
                weight_kg: "{{ item.weight_kg | default(0) }}"
                is_empty: "{{ item.is_empty | default(false) }}"
                seal_no: "{{ item.seal_no | default('') }}"
                dangerous_goods: "{{ item.dangerous_goods | default(null) }}"
            retry:
              max_attempts: 2
              backoff_s: [1, 3]

  - id: approve-awk
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: awk.approve
      body:
        doc_id: "{{ nodes.create-awk.output.data.doc_id }}"
    retry:
      max_attempts: 2
      backoff_s: [2, 5]

  - id: log-success
    type: log
    level: info
    message: >
      Train notification created via REST: train={{ trigger_data.train_no }},
      eta={{ trigger_data.eta }},
      wagons={{ trigger_data.wagons | length }},
      awk_id={{ nodes.create-awk.output.data.doc_id }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: train-notification-rest
    error: "{{ error }}"
    context:
      train_no: "{{ trigger_data.train_no | default('unknown') }}"
      carrier: "{{ trigger_data.carrier_code | default('unknown') }}"
