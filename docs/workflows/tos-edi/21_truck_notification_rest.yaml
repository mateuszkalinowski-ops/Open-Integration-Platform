name: truck-notification-rest
description: |
  Awizacja ciężarówki (tira) przez REST API. Zewnętrzna firma (spedytor,
  przewoźnik drogowy) wysyła JSON POST-em na /api/v1/workflows/{id}/execute
  z danymi odbioru/dostawy kontenera. OIP tworzy AWD w Pinquark TOS,
  dodaje kontenery, zatwierdza AWD i zwraca potwierdzenie z numerem dokumentu
  oraz oknem czasowym pickup/delivery.

trigger:
  type: http
  method: POST
  auth: api_key

nodes:

  - id: validate-input
    type: expression
    output: validated
    expression: |
      {% if not trigger_data.containers or trigger_data.containers | length == 0 %}
        {{ raise("containers array is required and must not be empty") }}
      {% endif %}
      {% if not trigger_data.direction %}
        {{ raise("direction is required: 'pickup' or 'delivery'") }}
      {% endif %}
      {{ trigger_data | tojson }}

  - id: create-awd
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: awd.create
      body:
        direction: "{{ trigger_data.direction }}"
        booking_ref: "{{ trigger_data.booking_ref | default('') }}"
        truck_plate: "{{ trigger_data.truck_plate | default('') }}"
        trailer_plate: "{{ trigger_data.trailer_plate | default('') }}"
        driver_name: "{{ trigger_data.driver_name | default('') }}"
        driver_id: "{{ trigger_data.driver_id | default('') }}"
        carrier_code: "{{ trigger_data.carrier_code | default('') }}"
        haulier_code: "{{ trigger_data.haulier_code | default('') }}"
        pickup_window_from: "{{ trigger_data.pickup_window_from | default('') }}"
        pickup_window_to: "{{ trigger_data.pickup_window_to | default('') }}"
        TOS_DOC_POL: "{{ trigger_data.pol | default('') }}"
        TOS_DOC_POD: "{{ trigger_data.pod | default('PLMAL') }}"
        note: "{{ trigger_data.note | default('REST API truck notification') }}"
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: add-containers
    type: foreach
    items: "{{ trigger_data.containers }}"
    parallel: false
    body:
      - id: add-container
        type: connector.action
        connector: rest-api
        account: clip-malaszewicze
        action: rest.call
        input:
          account: clip-malaszewicze
          named_action: train.add_container
          body:
            doc_id: "{{ nodes.create-awd.output.data.doc_id }}"
            container_no: "{{ item.container_no }}"
            iso_size_type: "{{ item.iso_size_type | default('') }}"
            weight_kg: "{{ item.weight_kg | default(0) }}"
            is_empty: "{{ item.is_empty | default(false) }}"
            seal_no: "{{ item.seal_no | default('') }}"
            dangerous_goods: "{{ item.dangerous_goods | default(null) }}"
            oog_details: "{{ item.oog_details | default(null) }}"
            reefer_temp: "{{ item.reefer_temp | default(null) }}"
        retry:
          max_attempts: 2
          backoff_s: [1, 3]

  - id: approve-awd
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: awd.approve
      body:
        doc_id: "{{ nodes.create-awd.output.data.doc_id }}"
    retry:
      max_attempts: 2
      backoff_s: [2, 5]

  - id: log-success
    type: log
    level: info
    message: >
      Truck notification created via REST: direction={{ trigger_data.direction }},
      truck={{ trigger_data.truck_plate | default('N/A') }},
      containers={{ trigger_data.containers | length }},
      awd_id={{ nodes.create-awd.output.data.doc_id }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: truck-notification-rest
    error: "{{ error }}"
    context:
      truck_plate: "{{ trigger_data.truck_plate | default('unknown') }}"
      direction: "{{ trigger_data.direction | default('unknown') }}"
