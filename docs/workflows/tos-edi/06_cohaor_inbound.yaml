name: cohaor-inbound
description: |
  COHAOR inbound workflow. Triggered when a new COHAOR .edi file is detected
  on partner SFTP. Parses the COHAOR message (container special handling order),
  sends CONTRL + APERAK acknowledgements, then creates a movement/handling
  order (PRZ) in TOS via rest-api connector. Partner-agnostic.

trigger:
  type: event
  connector: ftp-sftp
  event: file.new
  filter:
    path: "**/COHAOR_*.edi"

nodes:

  - id: resolve-partner
    type: connector.action
    connector: oip-internal
    action: partner_registry.resolve_by_ftp_account
    input:
      ftp_account: "{{ trigger.account }}"

  - id: download-file
    type: connector.action
    connector: ftp-sftp
    account: "{{ trigger.account }}"
    action: file.download
    input:
      path: "{{ trigger.data.path }}"

  - id: parse-cohaor
    type: connector.action
    connector: edifact
    account: "{{ resolve-partner.output.edifact_account }}"
    action: cohaor.parse
    input:
      content: "{{ nodes.download-file.output.content }}"
    on_error:
      - type: workflow.invoke
        workflow: 10_contrl_auto_response
        input:
          raw_content: "{{ nodes.download-file.output.content }}"
          edifact_account: "{{ resolve-partner.output.edifact_account }}"
          ftp_account: "{{ trigger.account }}"
          syntax_status: error
          error: "{{ error }}"

  - id: send-contrl-ack
    type: workflow.invoke
    workflow: 10_contrl_auto_response
    input:
      raw_content: "{{ nodes.download-file.output.content }}"
      edifact_account: "{{ resolve-partner.output.edifact_account }}"
      ftp_account: "{{ trigger.account }}"
      syntax_status: ok

  - id: send-aperak-ack
    type: workflow.invoke
    workflow: 08_aperak_auto_response
    input:
      parsed_message: "{{ nodes.parse-cohaor.output }}"
      edifact_account: "{{ resolve-partner.output.edifact_account }}"
      ftp_account: "{{ trigger.account }}"
      response_type: accepted

  - id: create-handling-order
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: movement.create
      body:
        operation_code: "{{ nodes.parse-cohaor.output.payload.operation_code }}"
        container_no: "{{ nodes.parse-cohaor.output.payload.container_no }}"
        location_from: "{{ nodes.parse-cohaor.output.payload.location_from }}"
        location_to: "{{ nodes.parse-cohaor.output.payload.location_to }}"
        requested_time: "{{ nodes.parse-cohaor.output.payload.requested_time }}"
        priority: "{{ nodes.parse-cohaor.output.payload.priority }}"
        special_instructions: "{{ nodes.parse-cohaor.output.payload.special_instructions }}"
        document_id: "{{ nodes.parse-cohaor.output.payload.document_id }}"
        function_code: "{{ nodes.parse-cohaor.output.payload.function_code }}"
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: archive-source
    type: connector.action
    connector: ftp-sftp
    account: "{{ trigger.account }}"
    action: file.move
    input:
      source: "{{ trigger.data.path }}"
      destination: "{{ trigger.data.path | replace('/inbound/', '/archive/') }}"

  - id: log-success
    type: log
    level: info
    message: >
      COHAOR inbound processed: {{ nodes.parse-cohaor.output.payload.document_id }},
      operation={{ nodes.parse-cohaor.output.payload.operation_code }},
      container={{ nodes.parse-cohaor.output.payload.container_no }},
      order_id={{ nodes.create-handling-order.output.data.doc_id }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: cohaor-inbound
    error: "{{ error }}"
    context:
      file_path: "{{ trigger.data.path }}"
      account: "{{ trigger.account }}"
