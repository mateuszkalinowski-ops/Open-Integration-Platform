name: tos-poll-events
description: |
  Main outbound event polling hub. Polls TOS tos_audit_log every 30 seconds
  via rest-api connector (account: clip-malaszewicze, named_action: events.poll).
  Routes events to subworkflows based on event_type for EDI message generation
  (APERAK, CODECO, COARRI, IFTSTA). Partner-agnostic — routing per partner
  happens inside subworkflows via partner_registry.

trigger:
  type: schedule
  cron: "*/30 * * * * *"
  initial_state:
    last_audit_id: 0

nodes:

  - id: load-cursor
    type: state.load
    output:
      last_audit_id: "{{ state.last_audit_id | default(0) }}"

  - id: poll-tos
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: events.poll
      body:
        last_audit_id: "{{ nodes.load-cursor.output.last_audit_id }}"
        limit: 1000
    timeout_s: 30
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: short-circuit-if-empty
    type: condition
    if: "{{ nodes.poll-tos.output.data.count == 0 }}"
    then:
      - id: log-idle
        type: log
        level: debug
        message: "No new events (cursor={{ nodes.load-cursor.output.last_audit_id }})"
      - id: end-idle
        type: end

  - id: route-events
    type: foreach
    items: "{{ nodes.poll-tos.output.data.events }}"
    parallel: false
    body:

      - id: classify
        type: switch
        on: "{{ item.event_type }}"
        cases:

          AWK_RAIL_ZATWIERDZONA:
            - type: workflow.invoke
              workflow: 08_aperak_auto_response
              input:
                event: "{{ item }}"
                response_type: accepted

          AWK_RAIL_ANULOWANA:
            - type: workflow.invoke
              workflow: 08_aperak_auto_response
              input:
                event: "{{ item }}"
                response_type: rejected

          AVD_ZATWIERDZONA:
            - type: workflow.invoke
              workflow: 08_aperak_auto_response
              input:
                event: "{{ item }}"
                response_type: accepted

          WJAZD_TIR_POTWIERDZONY:
            - type: workflow.invoke
              workflow: 02_codeco_outbound
              input:
                event: "{{ item }}"
                direction: gate-in

          WYJAZD_TIR_POTWIERDZONY:
            - type: workflow.invoke
              workflow: 02_codeco_outbound
              input:
                event: "{{ item }}"
                direction: gate-out

          WJAZD_TIR_ODRZUCONY:
            - type: workflow.invoke
              workflow: 08_aperak_auto_response
              input:
                event: "{{ item }}"
                response_type: rejected

          PRZELAD_ZAKONCZONY:
            - type: workflow.invoke
              workflow: 03_coarri_outbound
              input:
                event: "{{ item }}"

          POCIAG_PRZYJECHAL:
            - type: workflow.invoke
              workflow: 04_iftsta_outbound
              input:
                event: "{{ item }}"
                status_code: ARRIVED

          POCIAG_ODJECHAL:
            - type: workflow.invoke
              workflow: 04_iftsta_outbound
              input:
                event: "{{ item }}"
                status_code: DEPARTED

          USZKODZENIE_ZGLOSZONE:
            - type: workflow.invoke
              workflow: 04_iftsta_outbound
              input:
                event: "{{ item }}"
                status_code: DAMAGED

          STATUS_DOKUMENTU_ZMIENIONY:
            - type: workflow.invoke
              workflow: 04_iftsta_outbound
              input:
                event: "{{ item }}"
                status_code: "{{ item.details.new_status_code }}"

          PRZESUNIECIE_WYKONANE:
            - type: workflow.invoke
              workflow: 02_codeco_outbound
              input:
                event: "{{ item }}"
                direction: yard-move

          default:
            - type: log
              level: trace
              message: "Skipping event {{ item.event_type }} (no EDI mapping)"

  - id: save-cursor
    type: state.save
    input:
      last_audit_id: "{{ nodes.poll-tos.output.data.max_id }}"

  - id: metrics
    type: metrics.emit
    metrics:
      - name: tos_events_polled_total
        value: "{{ nodes.poll-tos.output.data.count }}"
        type: counter
      - name: tos_cursor_position
        value: "{{ nodes.poll-tos.output.data.max_id }}"
        type: gauge

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: tos-poll-events
    error: "{{ error }}"
    context:
      last_audit_id: "{{ nodes.load-cursor.output.last_audit_id }}"
