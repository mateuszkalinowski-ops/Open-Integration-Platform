name: iftmin-inbound-rest-edi
description: |
  IFTMIN via REST+EDIFACT. Zewnętrzna firma wysyła wiadomość EDIFACT IFTMIN
  (booking/transport instruction) jako string w JSON payload przez HTTP POST.
  OIP parsuje EDIFACT, tworzy zlecenie transportowe w TOS i zwraca
  APERAK/CONTRL w odpowiedzi HTTP.

trigger:
  type: http
  method: POST
  auth: api_key

nodes:

  - id: validate-input
    type: expression
    output: validated
    expression: |
      {% if not trigger_data.edifact_content %}
        {{ raise("edifact_content is required — raw EDIFACT string") }}
      {% endif %}
      {% if not trigger_data.partner_code %}
        {{ raise("partner_code is required (e.g. METRANS, HHLA)") }}
      {% endif %}
      {{ trigger_data | tojson }}

  - id: resolve-edifact-account
    type: connector.action
    connector: oip-internal
    action: partner_registry.resolve_by_code
    input:
      partner_code: "{{ trigger_data.partner_code }}"

  - id: parse-iftmin
    type: connector.action
    connector: edifact
    account: "{{ nodes.resolve-edifact-account.output.edifact_account }}"
    action: iftmin.parse
    input:
      content: "{{ trigger_data.edifact_content }}"
    on_error:
      - type: expression
        output: contrl_nack
        expression: |
          {{ edifact.build_contrl(
               raw_content=trigger_data.edifact_content,
               syntax_status="error",
               error=error
             ) }}

  - id: build-contrl-ack
    type: connector.action
    connector: edifact
    account: "{{ nodes.resolve-edifact-account.output.edifact_account }}"
    action: contrl.build
    input:
      raw_content: "{{ trigger_data.edifact_content }}"
      syntax_status: ok

  - id: build-aperak-ack
    type: connector.action
    connector: edifact
    account: "{{ nodes.resolve-edifact-account.output.edifact_account }}"
    action: aperak.build
    input:
      parsed_message: "{{ nodes.parse-iftmin.output }}"
      response_type: accepted

  - id: create-transport-order
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: zt_road.save
      body:
        transport_type: "{{ nodes.parse-iftmin.output.payload.transport_mode }}"
        booking_ref: "{{ nodes.parse-iftmin.output.payload.booking_ref }}"
        shipper: "{{ nodes.parse-iftmin.output.payload.shipper | tojson }}"
        consignee: "{{ nodes.parse-iftmin.output.payload.consignee | tojson }}"
        pol: "{{ nodes.parse-iftmin.output.payload.pol.un_locode }}"
        pod: "{{ nodes.parse-iftmin.output.payload.pod.un_locode }}"
        requested_date: "{{ nodes.parse-iftmin.output.payload.requested_date }}"
        containers: "{{ nodes.parse-iftmin.output.payload.containers | tojson }}"
        document_id: "{{ nodes.parse-iftmin.output.payload.document_id }}"
        carrier_code: "{{ nodes.parse-iftmin.output.payload.carrier.id }}"
        special_instructions: "{{ nodes.parse-iftmin.output.payload.special_instructions | default('') }}"
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: return-response
    type: expression
    output: response
    expression: |
      {
        "status": "accepted",
        "transport_order_id": "{{ nodes.create-transport-order.output.data.doc_id }}",
        "booking_ref": "{{ nodes.parse-iftmin.output.payload.booking_ref }}",
        "contrl": "{{ nodes.build-contrl-ack.output.edifact_content }}",
        "aperak": "{{ nodes.build-aperak-ack.output.edifact_content }}"
      }

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: iftmin-inbound-rest-edi
    error: "{{ error }}"
    context:
      partner_code: "{{ trigger_data.partner_code | default('unknown') }}"
