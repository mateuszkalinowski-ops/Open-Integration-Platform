name: iftmin-inbound
description: |
  IFTMIN inbound workflow. Triggered when a new IFTMIN .edi file is detected
  on partner SFTP. Parses the IFTMIN message (transport booking/instruction),
  sends CONTRL + APERAK acknowledgements, then creates a transport order
  in TOS via rest-api connector. Partner-agnostic.

trigger:
  type: event
  connector: ftp-sftp
  event: file.new
  filter:
    path: "**/IFTMIN_*.edi"

nodes:

  - id: resolve-partner
    type: connector.action
    connector: oip-internal
    action: partner_registry.resolve_by_ftp_account
    input:
      ftp_account: "{{ trigger.account }}"

  - id: download-file
    type: connector.action
    connector: ftp-sftp
    account: "{{ trigger.account }}"
    action: file.download
    input:
      path: "{{ trigger.data.path }}"

  - id: parse-iftmin
    type: connector.action
    connector: edifact
    account: "{{ resolve-partner.output.edifact_account }}"
    action: iftmin.parse
    input:
      content: "{{ nodes.download-file.output.content }}"
    on_error:
      - type: workflow.invoke
        workflow: 10_contrl_auto_response
        input:
          raw_content: "{{ nodes.download-file.output.content }}"
          edifact_account: "{{ resolve-partner.output.edifact_account }}"
          ftp_account: "{{ trigger.account }}"
          syntax_status: error
          error: "{{ error }}"

  - id: send-contrl-ack
    type: workflow.invoke
    workflow: 10_contrl_auto_response
    input:
      raw_content: "{{ nodes.download-file.output.content }}"
      edifact_account: "{{ resolve-partner.output.edifact_account }}"
      ftp_account: "{{ trigger.account }}"
      syntax_status: ok

  - id: send-aperak-ack
    type: workflow.invoke
    workflow: 08_aperak_auto_response
    input:
      parsed_message: "{{ nodes.parse-iftmin.output }}"
      edifact_account: "{{ resolve-partner.output.edifact_account }}"
      ftp_account: "{{ trigger.account }}"
      response_type: accepted

  - id: create-transport-order
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: transport_order.create
      body:
        document_id: "{{ nodes.parse-iftmin.output.payload.document_id }}"
        function_code: "{{ nodes.parse-iftmin.output.payload.function_code }}"
        shipper: "{{ nodes.parse-iftmin.output.payload.shipper }}"
        consignee: "{{ nodes.parse-iftmin.output.payload.consignee }}"
        port_of_loading: "{{ nodes.parse-iftmin.output.payload.port_of_loading }}"
        port_of_discharge: "{{ nodes.parse-iftmin.output.payload.port_of_discharge }}"
        goods_lines: "{{ nodes.parse-iftmin.output.payload.goods_lines }}"
        transport_details: "{{ nodes.parse-iftmin.output.payload.transport_details }}"
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: archive-source
    type: connector.action
    connector: ftp-sftp
    account: "{{ trigger.account }}"
    action: file.move
    input:
      source: "{{ trigger.data.path }}"
      destination: "{{ trigger.data.path | replace('/inbound/', '/archive/') }}"

  - id: log-success
    type: log
    level: info
    message: >
      IFTMIN inbound processed: {{ nodes.parse-iftmin.output.payload.document_id }},
      function={{ nodes.parse-iftmin.output.payload.function_code }},
      goods_lines={{ nodes.parse-iftmin.output.payload.goods_lines | length }},
      order_id={{ nodes.create-transport-order.output.data.doc_id }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: iftmin-inbound
    error: "{{ error }}"
    context:
      file_path: "{{ trigger.data.path }}"
      account: "{{ trigger.account }}"
