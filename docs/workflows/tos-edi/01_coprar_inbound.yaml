name: coprar-inbound
description: |
  COPRAR inbound workflow. Triggered when a new COPRAR .edi file is detected
  on partner SFTP. Parses the COPRAR message, sends APERAK acknowledgement,
  creates AWK (rail notification) in TOS via rest-api connector, then adds
  wagons and containers in foreach loops. Partner-agnostic — uses trigger
  account to resolve the partner dynamically.

trigger:
  type: event
  connector: ftp-sftp
  event: file.new
  filter:
    path: "**/COPRAR_*.edi"

nodes:

  - id: resolve-partner
    type: connector.action
    connector: oip-internal
    action: partner_registry.resolve_by_ftp_account
    input:
      ftp_account: "{{ trigger.account }}"

  - id: download-file
    type: connector.action
    connector: ftp-sftp
    account: "{{ trigger.account }}"
    action: file.download
    input:
      path: "{{ trigger.data.path }}"

  - id: parse-coprar
    type: connector.action
    connector: edifact
    account: "{{ resolve-partner.output.edifact_account }}"
    action: coprar.parse
    input:
      content: "{{ nodes.download-file.output.content }}"
    on_error:
      - type: workflow.invoke
        workflow: 10_contrl_auto_response
        input:
          raw_content: "{{ nodes.download-file.output.content }}"
          edifact_account: "{{ resolve-partner.output.edifact_account }}"
          ftp_account: "{{ trigger.account }}"
          syntax_status: error
          error: "{{ error }}"

  - id: send-contrl-ack
    type: workflow.invoke
    workflow: 10_contrl_auto_response
    input:
      raw_content: "{{ nodes.download-file.output.content }}"
      edifact_account: "{{ resolve-partner.output.edifact_account }}"
      ftp_account: "{{ trigger.account }}"
      syntax_status: ok

  - id: send-aperak-ack
    type: workflow.invoke
    workflow: 08_aperak_auto_response
    input:
      parsed_message: "{{ nodes.parse-coprar.output }}"
      edifact_account: "{{ resolve-partner.output.edifact_account }}"
      ftp_account: "{{ trigger.account }}"
      response_type: accepted

  - id: create-awk
    type: connector.action
    connector: rest-api
    account: clip-malaszewicze
    action: rest.call
    input:
      account: clip-malaszewicze
      named_action: awk.create
      body:
        tos_train_no: "{{ nodes.parse-coprar.output.payload.train_no }}"
        tos_doc_planned_arrival: "{{ nodes.parse-coprar.output.payload.eta }}"
        carrier_code: "{{ nodes.parse-coprar.output.payload.carrier.id }}"
        TOS_DOC_POL: "{{ nodes.parse-coprar.output.payload.pol.un_locode }}"
        TOS_DOC_POD: "{{ nodes.parse-coprar.output.payload.pod.un_locode }}"
        function_code: "{{ nodes.parse-coprar.output.payload.function_code }}"
        document_id: "{{ nodes.parse-coprar.output.payload.document_id }}"
    retry:
      max_attempts: 3
      backoff_s: [2, 5, 15]

  - id: add-wagons
    type: foreach
    items: "{{ nodes.parse-coprar.output.payload.wagons }}"
    parallel: false
    body:
      - id: add-wagon
        type: connector.action
        connector: rest-api
        account: clip-malaszewicze
        action: rest.call
        input:
          account: clip-malaszewicze
          named_action: wagon.add
          body:
            doc_id: "{{ nodes.create-awk.output.data.doc_id }}"
            wagon_no: "{{ item.wagon_no }}"
            wagon_type: "{{ item.wagon_type }}"
            sequence_no: "{{ item.sequence_no }}"
        retry:
          max_attempts: 2
          backoff_s: [1, 3]

  - id: add-containers
    type: foreach
    items: "{{ nodes.parse-coprar.output.payload.wagons }}"
    parallel: false
    body:
      - id: add-containers-per-wagon
        type: foreach
        items: "{{ item.containers }}"
        parallel: false
        body:
          - id: add-container
            type: connector.action
            connector: rest-api
            account: clip-malaszewicze
            action: rest.call
            input:
              account: clip-malaszewicze
              named_action: container.add
              body:
                doc_id: "{{ nodes.create-awk.output.data.doc_id }}"
                wagon_no: "{{ item.wagon_no }}"
                container_no: "{{ item.container_no }}"
                iso_size_type: "{{ item.iso_size_type }}"
                weight_kg: "{{ item.weight_kg }}"
                is_empty: "{{ item.is_empty }}"
                seal_no: "{{ item.seal_no }}"
                dangerous_goods: "{{ item.dangerous_goods }}"
            retry:
              max_attempts: 2
              backoff_s: [1, 3]

  - id: archive-source
    type: connector.action
    connector: ftp-sftp
    account: "{{ trigger.account }}"
    action: file.move
    input:
      source: "{{ trigger.data.path }}"
      destination: "{{ trigger.data.path | replace('/inbound/', '/archive/') }}"

  - id: log-success
    type: log
    level: info
    message: >
      COPRAR inbound processed: {{ nodes.parse-coprar.output.payload.document_id }},
      train={{ nodes.parse-coprar.output.payload.train_no }},
      wagons={{ nodes.parse-coprar.output.payload.wagons | length }},
      awk_id={{ nodes.create-awk.output.data.doc_id }}

error_handler:
  workflow: 11_dead_letter_queue
  input:
    source_workflow: coprar-inbound
    error: "{{ error }}"
    context:
      file_path: "{{ trigger.data.path }}"
      account: "{{ trigger.account }}"
