# pinquark Integration Platform — GitLab CI/CD Pipeline
# Following AGENTS.md sections 4 and 5

variables:
  DOCKER_REGISTRY: ${CI_REGISTRY}
  DOCKER_TLS_CERTDIR: "/certs"
  KUSTOMIZE_VERSION: "5.4.0"
  TRIVY_VERSION: "0.58.0"
  NAMESPACE: oip

stages:
  - lint
  - build
  - test
  - deploy-uat
  - verify

# ---------------------------------------------------------------------------
# Templates
# ---------------------------------------------------------------------------

.python_integrator:
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir ruff mypy pip-audit

.docker_build:
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo "$REGISTRY_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin

.kubectl:
  image: bitnami/kubectl:1.30
  before_script:
    - echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig

# ---------------------------------------------------------------------------
# Stage 1: Lint & Security Audit (AGENTS.md 5.2)
# ---------------------------------------------------------------------------

lint:python:
  extends: .python_integrator
  stage: lint
  script:
    - ruff check integrators/ shared/python/ --output-format=gitlab
    - ruff format --check integrators/ shared/python/
  rules:
    - changes:
        - integrators/**/*.py
        - shared/python/**/*.py

lint:dockerfile:
  stage: lint
  image: hadolint/hadolint:latest-debian
  script:
    - find integrators/ -name "Dockerfile" -exec hadolint {} \;
  rules:
    - changes:
        - integrators/**/Dockerfile

lint:security:
  extends: .python_integrator
  stage: lint
  script:
    - pip-audit -r integrators/ecommerce/allegro/v1.0.0/requirements.txt
    - pip install semgrep
    - semgrep --config auto integrators/ shared/python/ --json --output semgrep-results.json
  artifacts:
    paths:
      - semgrep-results.json
    when: always
  rules:
    - changes:
        - integrators/**/*
        - shared/python/**/*

lint:secrets:
  stage: lint
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --verbose
  allow_failure: false

# ---------------------------------------------------------------------------
# Stage 2: Build Docker Images (AGENTS.md 5.2, 4.1, 4.3)
# ---------------------------------------------------------------------------

.build_integrator:
  extends: .docker_build
  stage: build
  script:
    - |
      IMAGE="${DOCKER_REGISTRY}/integrations/${CATEGORY}/${SYSTEM}:${VERSION}-uat"
      IMAGE_SHA="${DOCKER_REGISTRY}/integrations/${CATEGORY}/${SYSTEM}:${CI_COMMIT_SHORT_SHA}"

      echo "Building ${IMAGE}..."
      docker build \
        --label "org.opencontainers.image.source=${CI_PROJECT_URL}" \
        --label "org.opencontainers.image.revision=${CI_COMMIT_SHA}" \
        -t "${IMAGE}" \
        -t "${IMAGE_SHA}" \
        "${BUILD_CONTEXT}"

      echo "Scanning image with Trivy..."
      docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy:${TRIVY_VERSION} image \
        --severity HIGH,CRITICAL \
        --exit-code 1 \
        "${IMAGE}"

      echo "Pushing images..."
      docker push "${IMAGE}"
      docker push "${IMAGE_SHA}"

# E-commerce
build:allegro:
  extends: .build_integrator
  variables:
    CATEGORY: ecommerce
    SYSTEM: allegro
    VERSION: "1.0.0"
    BUILD_CONTEXT: integrators/ecommerce/allegro/v1.0.0
  rules:
    - changes:
        - integrators/ecommerce/allegro/v1.0.0/**/*
        - shared/python/**/*

