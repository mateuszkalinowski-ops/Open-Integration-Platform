# ---------------------------------------------------------------------------
# Stage 3: Test (AGENTS.md 5.2, 12)
# ---------------------------------------------------------------------------

test:allegro:
  extends: .python_integrator
  stage: test
  script:
    - cd integrators/ecommerce/allegro/v1.0.0
    - pip install -r requirements.txt
    - pip install pytest pytest-asyncio pytest-cov httpx
    - pip install ../../shared/python 2>/dev/null || true
    - python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml:coverage.xml --cov-report=term
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: integrators/ecommerce/allegro/v1.0.0/coverage.xml
  rules:
    - changes:
        - integrators/ecommerce/allegro/v1.0.0/**/*
        - shared/python/**/*

test:shared-library:
  extends: .python_integrator
  stage: test
  script:
    - cd shared/python
    - pip install -e .
    - pip install pytest pytest-asyncio
    - python -m pytest tests/ -v --tb=short
  rules:
    - changes:
        - shared/python/**/*

# ---------------------------------------------------------------------------
# Stage 4: Deploy to UAT (AGENTS.md 5.2)
# ---------------------------------------------------------------------------

.deploy_integrator:
  extends: .kubectl
  stage: deploy-uat
  script:
    - |
      echo "==> Deploying ${CATEGORY}/${SYSTEM} to UAT..."
      kubectl kustomize "k8s/integrators/${KUSTOMIZE_PATH}" | kubectl apply -f -

      echo "==> Waiting for rollout..."
      kubectl rollout status deployment/"${SYSTEM}-integrator" \
        --namespace "$NAMESPACE" \
        --timeout=120s

      echo "==> Checking health endpoint..."
      for i in $(seq 1 30); do
        STATUS=$(kubectl exec -n "$NAMESPACE" \
          deploy/"${SYSTEM}-integrator" -- \
          python -c "import httpx; print(httpx.get('http://localhost:8000/health').status_code)" 2>/dev/null || echo "0")
        if [ "$STATUS" = "200" ]; then
          echo "Health check passed!"
          exit 0
        fi
        echo "Attempt $i/30: status=$STATUS, waiting..."
        sleep 5
      done
      echo "Health check failed after 30 attempts"
      kubectl logs -n "$NAMESPACE" deploy/"${SYSTEM}-integrator" --tail=50
      exit 1
  environment:
    name: uat/$SYSTEM
    url: https://${SYSTEM}.example.com

deploy:secrets:
  extends: .kubectl
  stage: deploy-uat
  script:
    - chmod +x ci/scripts/setup-secrets.sh
    - bash ci/scripts/setup-secrets.sh
  rules:
    - when: manual

deploy:infra:
  extends: .kubectl
  stage: deploy-uat
  script:
    - |
      echo "==> Applying base infrastructure..."
      kubectl kustomize k8s/base | kubectl apply -f -

      echo "==> Applying ingress..."
      kubectl kustomize k8s/base/ingress | kubectl apply -f -

      echo "==> Infrastructure deployed."
  rules:
    - changes:
        - k8s/base/**/*
    - when: manual

deploy:kafka:
  extends: .kubectl
  stage: deploy-uat
  script:
    - |
      echo "==> Applying Kafka cluster..."
      kubectl kustomize k8s/base/kafka | kubectl apply -f -

      echo "==> Waiting for Kafka to be ready..."
      kubectl wait kafka/pinquark-kafka \
        --namespace kafka \
        --for=condition=Ready \
        --timeout=300s
  rules:
    - changes:
        - k8s/base/kafka/**/*
    - when: manual

deploy:monitoring:
  extends: .kubectl
  stage: deploy-uat
  script:
