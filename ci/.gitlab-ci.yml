# ---------------------------------------------------------------------------
# Stage 5: Verification Agent (AGENTS.md 5.2, 6.2)
# ---------------------------------------------------------------------------

.verify_integrator:
  extends: .kubectl
  stage: verify
  script:
    - |
      echo "==> Verification Agent for ${SYSTEM}..."

      HEALTH_URL="http://${SYSTEM}-integrator.${NAMESPACE}.svc.cluster.local:8000/health"

      echo "Checking health..."
      kubectl exec -n "$NAMESPACE" deploy/"${SYSTEM}-integrator" -- \
        python -c "
      import httpx, json, sys
      r = httpx.get('http://localhost:8000/health')
      data = r.json()
      print(json.dumps(data, indent=2))
      if r.status_code != 200 or data.get('status') != 'healthy':
          sys.exit(1)
      "

      echo "Checking /docs endpoint..."
      kubectl exec -n "$NAMESPACE" deploy/"${SYSTEM}-integrator" -- \
        python -c "
      import httpx
      r = httpx.get('http://localhost:8000/docs')
      assert r.status_code == 200, f'Expected 200, got {r.status_code}'
      print('OpenAPI docs accessible')
      "

      echo "Checking /metrics endpoint..."
      kubectl exec -n "$NAMESPACE" deploy/"${SYSTEM}-integrator" -- \
        python -c "
      import httpx
      r = httpx.get('http://localhost:8000/metrics')
      assert r.status_code == 200, f'Expected 200, got {r.status_code}'
      assert 'integrator_requests_total' in r.text or 'python_info' in r.text
      print('Prometheus metrics accessible')
      "

      echo "==> Verification passed for ${SYSTEM}!"
  allow_failure: true

verify:allegro:
  extends: .verify_integrator
  variables:
    SYSTEM: allegro
  needs:
    - deploy:allegro
  rules:
    - changes:
        - integrators/ecommerce/allegro/**/*

# Deploy all (manual trigger)
deploy:all:
  extends: .kubectl
  stage: deploy-uat
  script:
    - |
      echo "==> Deploying full UAT overlay..."
      kubectl kustomize k8s/overlays/uat | kubectl apply -f -

      echo "==> Waiting for all deployments..."
      kubectl get deployments -n "$NAMESPACE" -o name | while read dep; do
        echo "Waiting for $dep..."
        kubectl rollout status "$dep" -n "$NAMESPACE" --timeout=120s
      done

      echo "==> Full platform deployment complete."
  rules:
    - when: manual
  environment:
    name: uat/full-platform
