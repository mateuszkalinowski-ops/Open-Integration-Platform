apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oip

resources:
  - ../../base

namePrefix: suus-

commonLabels:
  app.kubernetes.io/name: suus-integrator
  app.kubernetes.io/version: "1.0.0"
  category: courier
  system: suus

patches:
  - target:
      kind: Deployment
      name: integrator
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: your-registry.example.com/integrations/courier/suus:1.0.0-uat

generatorOptions:
  disableNameSuffixHash: true
