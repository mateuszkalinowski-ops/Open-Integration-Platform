apiVersion: apps/v1
kind: Deployment
metadata:
  name: integrator
  namespace: oip
  labels:
    app.kubernetes.io/part-of: pinquark
    app.kubernetes.io/component: integrator
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: integrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: integrator
        app.kubernetes.io/part-of: pinquark
        app.kubernetes.io/component: integrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pinquark-integrator
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: integrator
          image: your-registry.example.com/integrations/CATEGORY/SYSTEM:VERSION
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: integrator-secrets
            - configMapRef:
                name: integrator-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: integrator-data
        - name: config
          configMap:
            name: integrator-files
      imagePullSecrets:
        - name: registry-credentials
