apiVersion: v1
kind: ConfigMap
metadata:
  name: integrator-config
  namespace: oip
  labels:
    app.kubernetes.io/part-of: pinquark
data:
  LOG_LEVEL: "INFO"
  KAFKA_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: "pinquark-kafka-kafka-bootstrap.kafka.svc.cluster.local:9093"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
  PROMETHEUS_ENABLED: "true"
