# Docker registry credentials for pulling images from registry.pinquark.com
#
# Create this secret manually or via CI/CD:
#
#   kubectl create secret docker-registry registry-credentials \
#     --namespace pinquark-uat \
#     --docker-server=registry.pinquark.com \
#     --docker-username="${REGISTRY_USERNAME}" \
#     --docker-password="${REGISTRY_PASSWORD}" \
#     --docker-email=integrations@pinquark.com
#
# Or apply this template after replacing placeholders:

apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: pinquark-uat
  labels:
    app.kubernetes.io/part-of: pinquark
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_WITH_BASE64_DOCKER_CONFIG
