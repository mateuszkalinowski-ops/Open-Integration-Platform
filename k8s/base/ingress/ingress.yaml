            pathType: Prefix
            backend:
              service:
                name: pocztapolska-integrator
                port:
                  number: 8000
    - host: schenker.uat.pinquark.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: schenker-integrator
