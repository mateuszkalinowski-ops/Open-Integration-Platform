apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pinquark-integrators
  namespace: oip
  labels:
    app.kubernetes.io/part-of: pinquark
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-uat
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "*.example.com"
        - "example.com"
      secretName: oip-tls
  rules:
    # E-commerce integrators
    - host: allegro.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: allegro-integrator
                port:
                  number: 8000

    # Courier integrators
    - host: dhl.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhl-integrator
                port:
                  number: 8000
    - host: dpd.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dpd-integrator
                port:
                  number: 8000
    - host: fedex.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fedex-integrator
                port:
                  number: 8000
    - host: fedexpl.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fedexpl-integrator
                port:
                  number: 8000
    - host: geis.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: geis-integrator
                port:
                  number: 8000
    - host: gls.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gls-integrator
                port:
                  number: 8000
    - host: inpost.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inpost-integrator
                port:
                  number: 8000
    - host: orlenpaczka.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orlenpaczka-integrator
                port:
                  number: 8000
    - host: packeta.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: packeta-integrator
                port:
                  number: 8000
    - host: paxy.example.com
      http:
        paths:
