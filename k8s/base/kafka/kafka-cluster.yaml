apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: pinquark-kafka
  namespace: kafka
  labels:
    app.kubernetes.io/part-of: pinquark
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    authorization:
      type: simple
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      log.retention.hours: 168
      log.retention.bytes: 1073741824
      auto.create.topics.enable: false
      num.io.threads: 8
      num.network.threads: 5
      socket.send.buffer.bytes: 102400
      socket.receive.buffer.bytes: 102400
      socket.request.max.bytes: 104857600
      log.flush.interval.messages: 10000
      log.flush.interval.ms: 1000
      replica.fetch.max.bytes: 10485760
      message.max.bytes: 10485760
    storage:
      type: persistent-claim
      size: 50Gi
      class: linode-block-storage-retain
    resources:
      requests:
        memory: 2Gi
        cpu: "1"
      limits:
        memory: 4Gi
        cpu: "2"
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 10Gi
      class: linode-block-storage-retain
    resources:
      requests:
        memory: 1Gi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: pinquark-integrator
  namespace: kafka
  labels:
    strimzi.io/cluster: pinquark-kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations: ["Read", "Write", "Describe", "Create"]
        host: "*"
      - resource:
          type: group
          name: "pinquark-*"
          patternType: prefix
        operations: ["Read", "Describe"]
        host: "*"
